<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Jobs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['Courier New', 'monospace'],
                    },
                    colors: {
                        primary: '#FAFAFA',
                        secondary: '#F4F4F5',
                        elevated: '#FFFFFF',
                        borderSubtle: '#E4E4E7',
                        borderDefault: '#D4D4D8',
                        textPrimary: '#0A0A0A',
                        textSecondary: '#525252',
                        textTertiary: '#A3A3A3',
                        textDisabled: '#D4D4D4',
                        foamBlue: '#339DC7',
                        foamBlueHover: '#2B85A9',
                        foamBlueSubtle: 'rgba(51,157,199,0.10)',
                        accentSubtle: '#E1F0F7',
                        success: '#16A34A',
                        warning: '#D97706',
                        error: '#DC2626',
                        info: '#2563EB',
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'level-2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'sheet': '0 -4px 20px -2px rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFAFA;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (max-width: 375px) {
            .mobile-container {
                max-width: 375px;
                margin: 0 auto;
                min-height: 840px;
                background-color: #FAFAFA;
                position: relative;
            }
        }
    </style>
</head>
<body class="text-textPrimary bg-primary selection:bg-foamBlue selection:text-white m-0 p-0">

    <div id="app-container" class="w-full max-w-[375px] mx-auto min-h-[840px] bg-primary relative flex flex-col shadow-2xl md:shadow-none overflow-hidden">
        
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar flex flex-col pb-[140px] relative z-10">
            
            <section id="pending-approval-hero" class="pt-[48px] px-[16px] flex flex-col items-center text-center">
                <div class="w-[80px] h-[80px] rounded-full bg-accentSubtle flex items-center justify-center mb-[24px]">
                    <i class="fa-solid fa-clock text-[36px] text-foamBlue"></i>
                </div>
                
                <h1 class="font-serif text-[26px] font-bold text-textPrimary leading-tight mb-[12px]">
                    You're almost in.
                </h1>
                
                <p class="font-sans text-[15px] text-textSecondary leading-relaxed mb-[32px] max-w-[280px]">
                    Your manager will approve you with one tap. Usually happens fast.
                </p>
                
                <button type="button" class="w-full h-[48px] bg-foamBlue hover:bg-foamBlueHover active:bg-foamBlueHover text-white font-sans text-[16px] font-semibold rounded-[12px] transition-colors duration-200 shadow-level-2 flex items-center justify-center">
                    Explore the App
                </button>
            </section>

            <section id="status-card-section" class="mt-[32px] px-[16px]">
                <div class="w-full bg-elevated border border-borderSubtle rounded-[16px] p-[16px] shadow-level-1">
                    
                    <div id="status-item-1" class="flex items-center gap-[12px] mb-[16px]">
                        <div class="w-[20px] h-[20px] flex items-center justify-center shrink-0">
                            <i class="fa-solid fa-circle-check text-[20px] text-foamBlue"></i>
                        </div>
                        <p class="font-sans text-[15px] text-textPrimary">
                            Account created
                        </p>
                    </div>

                    <div id="status-item-2" class="flex items-center gap-[12px] mb-[16px]">
                        <div class="w-[20px] h-[20px] flex items-center justify-center shrink-0">
                            <i class="fa-solid fa-circle-check text-[20px] text-foamBlue"></i>
                        </div>
                        <p class="font-sans text-[15px] text-textPrimary">
                            Invite code verified
                        </p>
                    </div>

                    <div id="status-item-3" class="flex items-center gap-[12px] pb-[16px] border-b border-borderSubtle">
                        <div class="w-[20px] h-[20px] flex items-center justify-center shrink-0">
                            <i class="fa-solid fa-clock text-[20px] text-textTertiary"></i>
                        </div>
                        <p class="font-sans text-[15px] text-textTertiary">
                            Manager approval
                        </p>
                    </div>

                    <div id="team-joined-info" class="flex items-center gap-[12px] pt-[16px]">
                        <div class="w-[20px] h-[20px] flex items-center justify-center shrink-0">
                            <i class="fa-solid fa-users text-[20px] text-foamBlue"></i>
                        </div>
                        <p class="font-sans text-[15px] text-textPrimary">
                            You've joined Marcus T. Detailing
                        </p>
                    </div>

                </div>
            </section>

        </main>

        <nav id="bottom-navigation" class="fixed bottom-0 w-full max-w-[375px] bg-elevated border-t border-borderSubtle z-30">
            
            <div id="crew-sub-nav" class="flex items-center justify-around border-b border-borderSubtle px-[16px] h-[48px]">
                <button type="button" class="flex-1 h-full flex items-center justify-center font-sans text-[14px] font-semibold text-foamBlue border-b-2 border-foamBlue transition-colors">
                    My Jobs
                </button>
                <button type="button" class="flex-1 h-full flex items-center justify-center font-sans text-[14px] font-medium text-textTertiary hover:text-textPrimary transition-colors">
                    Earnings
                </button>
                <button type="button" class="flex-1 h-full flex items-center justify-center font-sans text-[14px] font-medium text-textTertiary hover:text-textPrimary transition-colors">
                    Profile
                </button>
            </div>

            <div id="main-bottom-nav" class="flex items-center justify-around px-[16px] py-[8px] h-[68px]">
                <button type="button" class="flex flex-col items-center gap-[4px] min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                    <i class="fa-solid fa-briefcase text-[22px] text-foamBlue"></i>
                    <span class="font-sans text-[11px] font-medium text-foamBlue">My Jobs</span>
                </button>
                <button type="button" class="flex flex-col items-center gap-[4px] min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                    <i class="fa-solid fa-calendar text-[22px] text-textTertiary"></i>
                    <span class="font-sans text-[11px] font-medium text-textTertiary">Schedule</span>
                </button>
                <button type="button" class="flex flex-col items-center gap-[4px] min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                    <i class="fa-solid fa-chart-line text-[22px] text-textTertiary"></i>
                    <span class="font-sans text-[11px] font-medium text-textTertiary">Stats</span>
                </button>
                <button type="button" class="flex flex-col items-center gap-[4px] min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                    <i class="fa-solid fa-gear text-[22px] text-textTertiary"></i>
                    <span class="font-sans text-[11px] font-medium text-textTertiary">Settings</span>
                </button>
            </div>
        </nav>

    </div>

</body>
</html>
