<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crew: Enter Invite Code</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['Courier New', 'monospace'],
                    },
                    colors: {
                        primary: '#FAFAFA',
                        secondary: '#F4F4F5',
                        elevated: '#FFFFFF',
                        borderSubtle: '#E4E4E7',
                        borderDefault: '#D4D4D8',
                        textPrimary: '#0A0A0A',
                        textSecondary: '#525252',
                        textTertiary: '#A3A3A3',
                        textDisabled: '#D4D4D4',
                        foamBlue: '#339DC7',
                        foamBlueHover: '#2B85A9',
                        foamBlueSubtle: 'rgba(51,157,199,0.10)',
                        accentSubtle: '#E1F0F7',
                        success: '#16A34A',
                        warning: '#D97706',
                        error: '#DC2626',
                        info: '#2563EB',
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'level-2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'sheet': '0 -4px 20px -2px rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFAFA;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (max-width: 375px) {
            .mobile-container {
                max-width: 375px;
                margin: 0 auto;
                min-height: 840px;
                background-color: #FAFAFA;
                position: relative;
            }
        }

        /* Custom input styling for the monospace code field */
        .code-input::placeholder {
            letter-spacing: 12px;
            color: #A3A3A3;
        }
        .code-input {
            letter-spacing: 12px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="text-textPrimary bg-primary selection:bg-foamBlue selection:text-white m-0 p-0">

    <div id="app-container" class="w-full max-w-[375px] mx-auto min-h-[840px] bg-primary relative flex flex-col shadow-2xl md:shadow-none overflow-hidden">
        
        <!-- Header -->
        <header id="progress-header" class="w-full pt-12 pb-4 px-4 bg-primary z-20 flex flex-col gap-4">
            <div class="flex items-center justify-between w-full">
                <button type="button" class="w-10 h-10 flex items-center justify-center text-textPrimary -ml-2">
                    <i class="fa-solid fa-arrow-left text-[20px]"></i>
                </button>
                <div class="w-10 h-10"></div>
            </div>
            <!-- Note: No progress bar as this is not explicitly a numbered step -->
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar flex flex-col pb-[160px] relative z-10 px-4">
            
            <!-- Header Section -->
            <section id="header-section" class="mt-[24px]">
                <h1 class="font-serif text-[26px] font-bold text-textPrimary leading-tight mb-[8px]">
                    Enter your invite code.
                </h1>
                <p class="font-sans text-[15px] text-textSecondary leading-relaxed">
                    Your manager sent this when they added you to their team.
                </p>
            </section>

            <!-- Code Input Section -->
            <section id="code-input-area" class="mt-[32px] flex flex-col items-center w-full">
                <div class="relative w-full px-[20px]">
                    <input 
                        type="text" 
                        maxlength="6" 
                        class="code-input w-full h-[72px] bg-elevated border-2 border-error rounded-[16px] font-mono text-[32px] font-semibold text-textPrimary text-center focus:outline-none focus:ring-0 shadow-level-1 transition-colors"
                        placeholder="_ _ _ _ _ _"
                        value="INVALID"
                    >
                </div>
                <!-- Error State Helper Text -->
                <p class="mt-[8px] font-sans text-[12px] text-error text-center">
                    That code doesn't match any team. Double-check with your manager.
                </p>
                
                <!-- Format Hint Card -->
                <div id="format-hint-card" class="mt-[16px] w-full bg-elevated border border-borderSubtle rounded-[12px] p-[12px] flex items-start gap-[12px] shadow-level-1 mx-4">
                    <div class="mt-[2px] shrink-0">
                        <i class="fa-solid fa-circle-info text-foamBlue text-[18px]"></i>
                    </div>
                    <p class="font-sans text-[13px] text-textSecondary leading-relaxed">
                        Codes look like: AB12CD. Check your text messages or email from your manager.
                    </p>
                </div>
            </section>

        </main>

        <!-- Fixed Action Footer -->
        <footer id="action-footer" class="fixed bottom-0 w-full max-w-[375px] bg-gradient-to-t from-primary via-primary to-transparent pt-12 pb-[24px] px-[16px] z-20 flex flex-col gap-[16px]">
            
            <button type="button" class="w-full h-[48px] bg-foamBlue hover:bg-foamBlueHover active:bg-foamBlueHover text-white font-sans text-[16px] font-semibold rounded-[12px] transition-colors duration-200 shadow-level-2 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                Join Team
            </button>

            <div class="flex flex-col items-center gap-[4px] w-full">
                <button class="font-sans text-[14px] font-medium text-foamBlue hover:text-foamBlueHover transition-colors py-[4px] text-center w-full">
                    Don't have a code?
                </button>
                <p class="font-sans text-[13px] text-textSecondary text-center mt-[4px]">
                    Contact your manager and ask them to add you in their Team tab.
                </p>
            </div>
            
        </footer>

    </div>

</body>
</html>
