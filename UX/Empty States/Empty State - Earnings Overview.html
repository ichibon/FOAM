<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earnings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        primary: '#FAFAFA',
                        secondary: '#F4F4F5',
                        elevated: '#FFFFFF',
                        borderSubtle: '#E4E4E7',
                        borderDefault: '#D4D4D8',
                        textPrimary: '#0A0A0A',
                        textSecondary: '#525252',
                        textTertiary: '#A3A3A3',
                        textDisabled: '#D4D4D4',
                        foamBlue: '#339DC7',
                        foamBlueHover: '#2B85A9',
                        foamBlueSubtle: 'rgba(51,157,199,0.10)',
                        accentSubtle: '#E1F0F7',
                        success: '#16A34A',
                        warning: '#D97706',
                        error: '#DC2626',
                        info: '#2563EB',
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'level-2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFAFA;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-textPrimary bg-primary selection:bg-foamBlue selection:text-white m-0 p-0">

    <div id="app-container" class="w-full max-w-[375px] mx-auto min-h-[840px] bg-primary relative flex flex-col shadow-2xl md:shadow-none overflow-hidden">
        
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar flex flex-col pb-[140px] relative z-10">
            
            <section id="period-filter-section" class="pt-[20px] px-[16px] pb-[16px]">
                <div class="flex gap-[8px] overflow-x-auto no-scrollbar">
                    <button type="button" class="shrink-0 h-[36px] px-[16px] bg-foamBlue text-white font-sans text-[13px] font-semibold rounded-full transition-colors duration-200">
                        This Week
                    </button>
                    <button type="button" class="shrink-0 h-[36px] px-[16px] bg-transparent text-textTertiary border border-borderDefault font-sans text-[13px] font-medium rounded-full active:bg-foamBlueSubtle transition-colors duration-200">
                        This Month
                    </button>
                    <button type="button" class="shrink-0 h-[36px] px-[16px] bg-transparent text-textTertiary border border-borderDefault font-sans text-[13px] font-medium rounded-full active:bg-foamBlueSubtle transition-colors duration-200">
                        All Time
                    </button>
                </div>
            </section>

            <section id="earnings-summary-section" class="px-[16px] pb-[24px]">
                <div class="w-full bg-elevated border border-borderSubtle rounded-[16px] p-[24px] shadow-level-1 text-center">
                    <h2 class="font-serif text-[36px] font-bold text-textTertiary leading-tight mb-[8px]">
                        $0
                    </h2>
                    <p class="font-sans text-[13px] text-textTertiary mb-[12px]">
                        Earned This Week
                    </p>
                    <p class="font-sans text-[13px] text-textTertiary">
                        $0 pending · $0 confirmed
                    </p>
                </div>
            </section>

            <section id="empty-state-section" class="px-[16px] pb-[24px] flex flex-col items-center text-center">
                <div class="w-[80px] h-[80px] rounded-full bg-accentSubtle flex items-center justify-center mb-[24px]">
                    <i class="fa-solid fa-dollar-sign text-[36px] text-foamBlue"></i>
                </div>
                
                <h3 class="font-serif text-[22px] font-bold text-textPrimary leading-tight mb-[12px] max-w-[280px]">
                    Your first earnings are coming.
                </h3>
                
                <p class="font-sans text-[15px] text-textSecondary leading-relaxed mb-[24px] max-w-[300px]">
                    Complete your first job and your earnings show up here in real time.
                </p>
                
                <button type="button" class="w-full h-[48px] bg-foamBlue hover:bg-foamBlueHover active:bg-foamBlueHover text-white font-sans text-[16px] font-semibold rounded-[12px] transition-colors duration-200 shadow-level-2 flex items-center justify-center">
                    View My Jobs
                </button>
            </section>

            <section id="pay-period-card-section" class="px-[16px] pb-[32px]">
                <div class="w-full bg-elevated border border-borderSubtle rounded-[16px] p-[16px] shadow-level-1">
                    <p class="font-sans text-[11px] font-semibold text-textTertiary uppercase tracking-wider mb-[12px]">
                        PAY PERIOD
                    </p>
                    <p class="font-sans text-[16px] font-semibold text-textPrimary mb-[8px]">
                        May 1 – May 15
                    </p>
                    <p class="font-sans text-[13px] text-textSecondary mb-[6px]">
                        Paid by Marcus T. Detailing
                    </p>
                    <p class="font-sans text-[13px] text-textTertiary">
                        Next payout: May 16
                    </p>
                </div>
            </section>

        </main>

        <nav id="bottom-navigation" class="fixed bottom-0 w-full max-w-[375px] bg-elevated border-t border-borderSubtle z-30">
            
            <div id="crew-sub-nav" class="flex items-center justify-around border-b border-borderSubtle px-[16px] h-[48px]">
                <button type="button" class="flex-1 h-full flex items-center justify-center font-sans text-[14px] font-medium text-textTertiary hover:text-textPrimary transition-colors">
                    My Jobs
                </button>
                <button type="button" class="flex-1 h-full flex items-center justify-center font-sans text-[14px] font-semibold text-foamBlue border-b-2 border-foamBlue transition-colors">
                    Earnings
                </button>
                <button type="button" class="flex-1 h-full flex items-center justify-center font-sans text-[14px] font-medium text-textTertiary hover:text-textPrimary transition-colors">
                    Profile
                </button>
            </div>

            <div id="main-bottom-nav" class="flex items-center justify-around px-[16px] py-[8px] h-[68px]">
                <button type="button" class="flex flex-col items-center gap-[4px] min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                    <i class="fa-solid fa-briefcase text-[22px] text-textTertiary"></i>
                    <span class="font-sans text-[11px] font-medium text-textTertiary">My Jobs</span>
                </button>
                <button type="button" class="flex flex-col items-center gap-[4px] min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                    <i class="fa-solid fa-calendar text-[22px] text-textTertiary"></i>
                    <span class="font-sans text-[11px] font-medium text-textTertiary">Schedule</span>
                </button>
                <button type="button" class="flex flex-col items-center gap-[4px] min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                    <i class="fa-solid fa-chart-line text-[22px] text-textTertiary"></i>
                    <span class="font-sans text-[11px] font-medium text-textTertiary">Stats</span>
                </button>
                <button type="button" class="flex flex-col items-center gap-[4px] min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                    <i class="fa-solid fa-gear text-[22px] text-textTertiary"></i>
                    <span class="font-sans text-[11px] font-medium text-textTertiary">Settings</span>
                </button>
            </div>
        </nav>

    </div>

</body>
</html>
