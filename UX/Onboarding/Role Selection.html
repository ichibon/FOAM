<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOAM Role Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            surface: '#FFFFFF',
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8',
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4',
                        },
                        brand: {
                            primary: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51,157,199,0.10)',
                            card2: '#6BB8D4',
                            card3: '#E1F0F7',
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            error: '#DC2626',
                            info: '#2563EB',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        playfair: ['Playfair Display', 'serif'],
                    },
                    spacing: {
                        'screen-w': '375px',
                        'screen-h': '840px',
                    },
                    animation: {
                        'slide-up': 'slideUp 400ms ease-out forwards',
                        'fade-in': 'fadeIn 300ms ease-out forwards',
                        'float-1': 'float 6s ease-in-out infinite',
                        'float-2': 'float 8s ease-in-out infinite reverse',
                        'float-3': 'float 7s ease-in-out infinite 1s',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(var(--tw-rotate))' },
                            '50%': { transform: 'translateY(-10px) rotate(var(--tw-rotate))' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { margin: 0; padding: 0; background-color: #FAFAFA; overscroll-behavior-y: none; }
    </style>
</head>
<body class="bg-background-primary flex items-center justify-center min-h-[100dvh] antialiased">

    <!-- Mobile Container Wrapper -->
    <main id="main-container" class="w-full max-w-[375px] h-[840px] max-h-[100dvh] bg-background-primary relative flex flex-col overflow-hidden mx-auto shadow-[0_0_40px_rgba(0,0,0,0.05)] sm:rounded-[40px] sm:my-8 sm:h-[840px] sm:border-[8px] sm:border-gray-900">
        
        <!-- Header Section -->
        <section id="screen_header" class="w-full pt-[64px] pb-[32px] px-[16px] flex-shrink-0 animate-fade-in">
            <h1 class="font-playfair text-[28px] font-[700] text-text-primary leading-[1.2] mb-[8px]">
                What brings you here?
            </h1>
            <p class="font-inter text-[15px] font-[400] text-text-secondary leading-[1.4]">
                We'll build your experience around your answer.
            </p>
        </section>

        <!-- Role Cards Container -->
        <section id="role_selection_cards" class="w-full px-[16px] flex flex-col gap-[12px] flex-grow overflow-y-auto pb-[100px] animate-slide-up" style="animation-delay: 100ms;">
            
            <!-- Card A: Customer -->
            <button id="role_card_customer" class="w-full bg-background-surface rounded-[16px] p-[16px] flex items-center border border-border-subtle shadow-[0_2px_8px_rgba(0,0,0,0.04)] text-left transition-transform active:scale-[0.98]">
                <!-- Icon Container -->
                <div class="w-[56px] h-[56px] rounded-full bg-brand-subtle flex items-center justify-center flex-shrink-0 mr-[12px]">
                    <i data-lucide="car" class="w-[32px] h-[32px] text-brand-primary"></i>
                </div>
                
                <!-- Text Content -->
                <div class="flex-grow pr-[12px]">
                    <h3 class="font-inter text-[17px] font-[600] text-text-primary mb-[2px]">I need my car detailed</h3>
                    <p class="font-inter text-[13px] font-[400] text-text-secondary leading-[1.3]">Find detailers, book, and pay.</p>
                </div>
                
                <!-- Chevron -->
                <i data-lucide="chevron-right" class="w-[20px] h-[20px] text-text-tertiary flex-shrink-0"></i>
            </button>

            <!-- Card B: Operator (Featured) -->
            <button id="role_card_operator" class="w-full bg-background-surface rounded-[16px] p-[16px] flex items-center border-[2px] border-brand-primary shadow-[0_4px_16px_rgba(0,0,0,0.08)] text-left relative transition-transform active:scale-[0.98]">
                
                <!-- Badge -->
                <div class="absolute top-[-10px] right-[16px] bg-brand-subtle text-brand-primary font-inter text-[11px] font-[500] px-[8px] py-[2px] rounded-full backdrop-blur-sm border border-brand-primary/20">
                    Most popular
                </div>

                <!-- Icon Container -->
                <div class="w-[56px] h-[56px] rounded-full bg-brand-subtle flex items-center justify-center flex-shrink-0 mr-[12px]">
                    <i data-lucide="briefcase" class="w-[32px] h-[32px] text-brand-primary"></i>
                </div>
                
                <!-- Text Content -->
                <div class="flex-grow pr-[12px]">
                    <h3 class="font-inter text-[17px] font-[600] text-text-primary mb-[2px]">I run a detailing business</h3>
                    <p class="font-inter text-[13px] font-[400] text-text-secondary leading-[1.3]">Manage bookings, crew, and payments.</p>
                </div>
                
                <!-- Chevron -->
                <i data-lucide="chevron-right" class="w-[20px] h-[20px] text-text-tertiary flex-shrink-0"></i>
            </button>

            <!-- Card C: Crew -->
            <button id="role_card_crew" class="w-full bg-background-surface rounded-[16px] p-[16px] flex items-center border border-border-subtle shadow-[0_2px_8px_rgba(0,0,0,0.04)] text-left transition-transform active:scale-[0.98]">
                <!-- Icon Container -->
                <div class="w-[56px] h-[56px] rounded-full bg-brand-subtle flex items-center justify-center flex-shrink-0 mr-[12px]">
                    <i data-lucide="users" class="w-[32px] h-[32px] text-brand-primary"></i>
                </div>
                
                <!-- Text Content -->
                <div class="flex-grow pr-[12px]">
                    <h3 class="font-inter text-[17px] font-[600] text-text-primary mb-[2px]">I'm part of a crew</h3>
                    <p class="font-inter text-[13px] font-[400] text-text-secondary leading-[1.3]">See your jobs and track your earnings.</p>
                </div>
                
                <!-- Chevron -->
                <i data-lucide="chevron-right" class="w-[20px] h-[20px] text-text-tertiary flex-shrink-0"></i>
            </button>

        </section>

        <!-- Footer Note -->
        <section id="sticky_footer_note" class="absolute bottom-[16px] w-full text-center px-[16px] animate-fade-in" style="animation-delay: 300ms;">
            <p class="font-inter text-[12px] font-[400] text-text-tertiary">
                Not sure? You can always change this later.
            </p>
        </section>

    </main>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
