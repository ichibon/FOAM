<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join Crew</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['Courier New', 'monospace'],
                    },
                    colors: {
                        primary: '#FAFAFA',
                        secondary: '#F4F4F5',
                        elevated: '#FFFFFF',
                        borderSubtle: '#E4E4E7',
                        borderDefault: '#D4D4D8',
                        textPrimary: '#0A0A0A',
                        textSecondary: '#525252',
                        textTertiary: '#A3A3A3',
                        textDisabled: '#D4D4D4',
                        foamBlue: '#339DC7',
                        foamBlueHover: '#2B85A9',
                        foamBlueSubtle: 'rgba(51,157,199,0.10)',
                        accentSubtle: '#E1F0F7',
                        success: '#16A34A',
                        warning: '#D97706',
                        error: '#DC2626',
                        info: '#2563EB',
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'level-2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'sheet': '0 -4px 20px -2px rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFAFA;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (max-width: 375px) {
            .mobile-container {
                max-width: 375px;
                margin: 0 auto;
                min-height: 840px;
                background-color: #FAFAFA;
                position: relative;
            }
        }
    </style>
</head>
<body class="text-textPrimary bg-primary selection:bg-foamBlue selection:text-white m-0 p-0">

    <div id="app-container" class="w-full max-w-[375px] mx-auto min-h-[840px] bg-primary relative flex flex-col shadow-2xl md:shadow-none overflow-hidden">
        
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar flex flex-col pb-[24px] relative z-10 px-4">
            
            <section id="logo-section" class="mt-[64px] flex justify-center">
                <h1 class="font-serif text-[40px] font-bold text-textPrimary tracking-tight">
                    FOAM
                </h1>
            </section>

            <section id="invite-context-card" class="mt-[24px] bg-elevated border border-borderSubtle rounded-[16px] p-[16px] shadow-level-1">
                <div class="flex items-start gap-[12px]">
                    <div class="w-[44px] h-[44px] rounded-full bg-foamBlue flex items-center justify-center flex-shrink-0">
                        <span class="font-sans text-[16px] font-semibold text-white">MT</span>
                    </div>
                    
                    <div class="flex-1 flex flex-col gap-[4px]">
                        <h2 class="font-sans text-[16px] font-semibold text-textPrimary leading-tight">
                            Marcus T. Detailing
                        </h2>
                        <p class="font-sans text-[14px] text-textSecondary leading-snug">
                            invited you to join their crew
                        </p>
                        <div class="flex items-center gap-[6px] mt-[4px]">
                            <span class="font-sans text-[13px] text-textTertiary">Marcus T. Detailing</span>
                            <span class="text-textTertiary">·</span>
                            <span class="font-sans text-[13px] text-textTertiary">Atlanta, GA</span>
                            <span class="text-textTertiary">·</span>
                            <div class="flex items-center gap-[2px]">
                                <span class="font-sans text-[13px] text-textTertiary">4.9</span>
                                <i class="fa-solid fa-star text-[11px] text-warning"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="cta-label" class="mt-[16px] flex justify-center">
                <p class="font-sans text-[15px] text-textSecondary text-center">
                    Create your account to accept
                </p>
            </section>

            <section id="cta-buttons" class="mt-[16px] flex flex-col gap-[8px]">
                <button type="button" class="w-full h-[48px] bg-foamBlue hover:bg-foamBlueHover active:bg-foamBlueHover text-white font-sans text-[16px] font-semibold rounded-[12px] transition-colors duration-200 shadow-level-2 flex items-center justify-center">
                    Create Account
                </button>
                
                <button type="button" class="w-full h-[48px] bg-transparent border-2 border-foamBlue hover:bg-foamBlueSubtle active:bg-foamBlueSubtle text-foamBlue font-sans text-[16px] font-semibold rounded-[12px] transition-colors duration-200 flex items-center justify-center">
                    I already have an account
                </button>
            </section>

            <section id="legal-note" class="mt-[24px] flex justify-center px-[24px]">
                <p class="font-sans text-[11px] text-textTertiary text-center leading-relaxed">
                    By continuing, you agree to our Terms and Privacy Policy.
                </p>
            </section>

        </main>

    </div>

</body>
</html>
