<!DOCTYPE html>
<html lang="en"><head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        primary: '#FAFAFA',
                        secondary: '#F4F4F5',
                        surface: '#FFFFFF',
                        borderSubtle: '#E4E4E7',
                        borderDefault: '#D4D4D8',
                        textPrimary: '#0A0A0A',
                        textSecondary: '#525252',
                        textTertiary: '#A3A3A3',
                        textDisabled: '#D4D4D4',
                        brandBlue: '#339DC7',
                        brandBlueHover: '#2B85A9',
                        brandBlueSubtle: 'rgba(51, 157, 199, 0.10)',
                        success: '#16A34A',
                        warning: '#D97706',
                        warningSubtle: 'rgba(217, 119, 6, 0.08)',
                        error: '#DC2626',
                        info: '#2563EB',
                    },
                    boxShadow: {
                        'level1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'level2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'notification': '0 10px 25px -5px rgba(0, 0, 0, 0.25), 0 8px 10px -6px rgba(0, 0, 0, 0.15)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #000000; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .phone-screen {
            position: relative;
            width: 375px;
            height: 840px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            overflow: hidden;
        }
        
        .screen-dimmed {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .notification-card {
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .status-bar {
            background: transparent;
            color: white;
            font-size: 14px;
        }
        
        .time-display {
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .notification-bg {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
    </style>
</head>
<body>

    <div class="phone-screen">
        
        <div id="status-bar" class="status-bar absolute top-0 left-0 right-0 z-50 px-6 pt-3 pb-2">
            <div class="flex items-center justify-between">
                <div class="time-display">9:41</div>
                <div class="flex items-center gap-1.5">
                    <i class="fa-solid fa-signal text-[14px]"></i>
                    <i class="fa-solid fa-wifi text-[14px]"></i>
                    <i class="fa-solid fa-battery-full text-[18px]"></i>
                </div>
            </div>
        </div>

        <div class="screen-dimmed"></div>

        <div id="notification-container" class="absolute top-14 left-4 right-4 z-50">
            <div class="notification-card notification-bg rounded-[20px] shadow-notification overflow-hidden">
                
                <div class="flex items-start gap-3 p-4">
                    
                    <div class="flex-shrink-0 w-10 h-10 rounded-[10px] bg-brandBlue flex items-center justify-center overflow-hidden">
                        <i class="fa-solid fa-car text-white text-[20px]"></i>
                    </div>

                    <div class="flex-1 min-w-0 pt-0.5">
                        <div class="flex items-center justify-between mb-1">
                            <h3 class="font-sans text-[13px] font-semibold text-textPrimary">FOAM</h3>
                            <span class="font-sans text-[11px] text-textTertiary">now</span>
                        </div>
                        <p class="font-sans text-[14px] text-textPrimary leading-snug">
                            🎉 You're approved! Your profile is now live in Atlanta.
                        </p>
                    </div>

                </div>

            </div>
        </div>

        <div id="screen-content" class="absolute inset-0 flex items-center justify-center px-8">
            <div class="text-center">
                <div class="w-16 h-16 rounded-full bg-white bg-opacity-10 flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-bell text-white text-opacity-40 text-[32px]"></i>
                </div>
                <p class="font-sans text-[13px] text-white text-opacity-50">Tap notification to open</p>
            </div>
        </div>

        <div id="home-indicator" class="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-32 h-1 bg-white bg-opacity-30 rounded-full"></div>

    </div>

</body></html>
