<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            elevated: '#FFFFFF'
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8'
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4'
                        },
                        brand: {
                            default: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51, 157, 199, 0.1)'
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            error: '#DC2626',
                            info: '#2563EB',
                            successSubtle: 'rgba(22, 163, 74, 0.10)',
                            warningSubtle: 'rgba(217, 119, 6, 0.10)'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24)',
                        'level-2': '0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #FAFAFA; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-text-primary antialiased flex justify-center w-full">
    <div class="w-full max-w-[375px] min-h-[840px] bg-background-primary relative overflow-x-hidden flex flex-col">
        
        <main id="empty-state-main" class="flex-1 overflow-y-auto px-6 flex flex-col items-center justify-center">
            
            <section id="empty-state-content" class="w-full flex flex-col items-center text-center">
                <div class="w-[80px] h-[80px] rounded-full bg-brand-subtle flex items-center justify-center mb-6">
                    <i data-lucide="car" class="w-[36px] h-[36px] text-brand-default"></i>
                </div>
                
                <h2 class="font-sans text-[24px] font-semibold text-text-primary mb-3 leading-tight">
                    No rides added yet.
                </h2>
                
                <p class="font-sans text-[15px] text-text-secondary mb-8 leading-relaxed max-w-[300px]">
                    Add your vehicle once and we'll remember it for every booking.
                </p>
                
                <button class="w-full h-[48px] bg-brand-default text-white rounded-[12px] font-sans text-[15px] font-semibold active:bg-brand-hover transition-colors shadow-sm mb-3">
                    Add a Vehicle
                </button>

                <button class="w-full h-[48px] bg-transparent text-text-tertiary rounded-[12px] font-sans text-[15px] font-medium active:bg-background-secondary transition-colors">
                    I'll add it later
                </button>
            </section>

        </main>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
