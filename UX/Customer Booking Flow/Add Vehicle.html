<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            elevated: '#FFFFFF'
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8'
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4'
                        },
                        brand: {
                            default: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51, 157, 199, 0.1)'
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            error: '#DC2626',
                            info: '#2563EB',
                            successSubtle: 'rgba(22, 163, 74, 0.10)'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24)',
                        'level-2': '0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23)',
                        'level-3': '0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #FAFAFA; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .input-focused {
            border-color: #339DC7;
            box-shadow: 0 0 0 3px rgba(51, 157, 199, 0.1);
        }
        .toast {
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="font-sans text-text-primary antialiased flex justify-center w-full">
    <div class="w-full max-w-[375px] min-h-[840px] bg-background-primary relative overflow-x-hidden">
        
        <header id="header" class="w-full px-4 pt-12 pb-4 bg-background-elevated border-b border-border-subtle flex items-center gap-3">
            <button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-background-secondary transition-colors" onclick="goBack()">
                <i data-lucide="chevron-left" class="w-5 h-5 text-text-primary"></i>
            </button>
            <h1 class="text-[18px] font-semibold text-text-primary">Add Vehicle</h1>
        </header>

        <section id="form-section" class="px-4 py-6">
            <form id="vehicle-form" class="flex flex-col gap-4">
                
                <div class="flex flex-col gap-2">
                    <label for="make" class="text-[13px] font-medium text-text-secondary">Make</label>
                    <input 
                        type="text" 
                        id="make" 
                        name="make"
                        placeholder="e.g., Audi, BMW, Tesla"
                        class="w-full h-[48px] px-4 bg-background-elevated border border-border-default rounded-[8px] text-[15px] text-text-primary placeholder-text-tertiary focus:outline-none transition-all"
                        onfocus="this.classList.add('input-focused')"
                        onblur="this.classList.remove('input-focused')"
                        required
                    />
                </div>

                <div class="flex flex-col gap-2">
                    <label for="model" class="text-[13px] font-medium text-text-secondary">Model</label>
                    <input 
                        type="text" 
                        id="model" 
                        name="model"
                        placeholder="e.g., Q5, X5, Model 3"
                        class="w-full h-[48px] px-4 bg-background-elevated border border-border-default rounded-[8px] text-[15px] text-text-primary placeholder-text-tertiary focus:outline-none transition-all"
                        onfocus="this.classList.add('input-focused')"
                        onblur="this.classList.remove('input-focused')"
                        required
                    />
                </div>

                <div class="flex flex-col gap-2">
                    <label for="year" class="text-[13px] font-medium text-text-secondary">Year</label>
                    <input 
                        type="number" 
                        id="year" 
                        name="year"
                        placeholder="e.g., 2021"
                        min="1900"
                        max="2025"
                        class="w-full h-[48px] px-4 bg-background-elevated border border-border-default rounded-[8px] text-[15px] text-text-primary placeholder-text-tertiary focus:outline-none transition-all"
                        onfocus="this.classList.add('input-focused')"
                        onblur="this.classList.remove('input-focused')"
                        required
                    />
                </div>

                <div class="flex flex-col gap-2">
                    <label for="color" class="text-[13px] font-medium text-text-secondary">Color</label>
                    <input 
                        type="text" 
                        id="color" 
                        name="color"
                        placeholder="e.g., Black, White, Silver"
                        class="w-full h-[48px] px-4 bg-background-elevated border border-border-default rounded-[8px] text-[15px] text-text-primary placeholder-text-tertiary focus:outline-none transition-all"
                        onfocus="this.classList.add('input-focused')"
                        onblur="this.classList.remove('input-focused')"
                        required
                    />
                </div>

                <div class="flex flex-col gap-2 mt-2">
                    <label for="license" class="text-[13px] font-medium text-text-secondary">License Plate <span class="text-text-tertiary">(Optional)</span></label>
                    <input 
                        type="text" 
                        id="license" 
                        name="license"
                        placeholder="e.g., ABC-1234"
                        class="w-full h-[48px] px-4 bg-background-elevated border border-border-default rounded-[8px] text-[15px] text-text-primary placeholder-text-tertiary focus:outline-none transition-all"
                        onfocus="this.classList.add('input-focused')"
                        onblur="this.classList.remove('input-focused')"
                    />
                </div>

            </form>
        </section>

        <section id="info-banner" class="px-4 mb-6">
            <div class="bg-brand-subtle border border-brand-default/20 rounded-[12px] p-4 flex gap-3">
                <i data-lucide="info" class="w-5 h-5 text-brand-default flex-shrink-0 mt-0.5"></i>
                <div class="flex flex-col gap-1">
                    <p class="text-[13px] text-text-primary font-medium">Vehicle saved to your profile</p>
                    <p class="text-[12px] text-text-secondary">You can use this vehicle for future bookings and it will be automatically selected for the current appointment.</p>
                </div>
            </div>
        </section>

        <section id="sticky-bottom-cta" class="fixed bottom-[80px] w-full max-w-[375px] bg-background-elevated px-4 py-3 border-t border-border-subtle shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40">
            <button 
                id="save-button" 
                class="w-full h-[48px] bg-brand-default text-white rounded-[8px] text-[15px] font-medium hover:bg-brand-hover transition-colors shadow-sm disabled:bg-text-disabled disabled:cursor-not-allowed"
                onclick="saveVehicle()"
            >
                Save Vehicle
            </button>
        </section>

        <nav id="bottom-nav" class="fixed bottom-0 w-full max-w-[375px] bg-background-elevated border-t border-border-subtle pb-safe pt-2 px-6 flex justify-between items-center z-50 h-[80px]">
            <a href="#" class="flex flex-col items-center gap-1 text-brand-default">
                <i data-lucide="map-pin" class="w-[20px] h-[20px]"></i>
                <span class="text-[10px] font-medium">Discover</span>
            </a>
            <a href="#" class="flex flex-col items-center gap-1 text-text-tertiary hover:text-text-secondary transition-colors">
                <i data-lucide="calendar" class="w-[20px] h-[20px]"></i>
                <span class="text-[10px] font-medium">Bookings</span>
            </a>
            <a href="#" class="flex flex-col items-center gap-1 text-text-tertiary hover:text-text-secondary transition-colors">
                <i data-lucide="user" class="w-[20px] h-[20px]"></i>
                <span class="text-[10px] font-medium">Profile</span>
            </a>
        </nav>

        <div id="toast-container" class="fixed bottom-[160px] left-0 right-0 flex justify-center px-4 z-[80] max-w-[375px] mx-auto">
            <div id="toast" class="toast bg-text-primary text-white px-4 py-3 rounded-[12px] shadow-level-3 flex items-center gap-2">
                <i data-lucide="check-circle" class="w-4 h-4"></i>
                <span id="toast-message" class="text-[13px] font-medium"></span>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        function goBack() {
        }

        function saveVehicle() {
            const form = document.getElementById('vehicle-form');
            const make = document.getElementById('make').value.trim();
            const model = document.getElementById('model').value.trim();
            const year = document.getElementById('year').value.trim();
            const color = document.getElementById('color').value.trim();
            const license = document.getElementById('license').value.trim();

            if (!make || !model || !year || !color) {
                showToast('Please fill in all required fields');
                return;
            }

            const vehicleData = {
                make,
                model,
                year,
                color,
                license,
                displayName: `${year} ${make} ${model} · ${color}`
            };

            showToast(`${vehicleData.displayName} saved successfully`);

            setTimeout(() => {
            }, 1500);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            lucide.createIcons();
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.getElementById('vehicle-form').addEventListener('submit', function(e) {
            e.preventDefault();
            saveVehicle();
        });

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', function() {
                const saveButton = document.getElementById('save-button');
                const make = document.getElementById('make').value.trim();
                const model = document.getElementById('model').value.trim();
                const year = document.getElementById('year').value.trim();
                const color = document.getElementById('color').value.trim();

                if (make && model && year && color) {
                    saveButton.disabled = false;
                } else {
                    saveButton.disabled = true;
                }
            });
        });

        document.getElementById('save-button').disabled = true;
    </script>
</body>
</html>
