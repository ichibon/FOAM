<!DOCTYPE html>
<html lang="en"><head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Approved</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        primary: '#FAFAFA',
                        secondary: '#F4F4F5',
                        surface: '#FFFFFF',
                        borderSubtle: '#E4E4E7',
                        borderDefault: '#D4D4D8',
                        textPrimary: '#0A0A0A',
                        textSecondary: '#525252',
                        textTertiary: '#A3A3A3',
                        textDisabled: '#D4D4D4',
                        brandBlue: '#339DC7',
                        brandBlueHover: '#2B85A9',
                        brandBlueSubtle: 'rgba(51, 157, 199, 0.10)',
                        success: '#16A34A',
                        successSubtle: 'rgba(22, 163, 74, 0.10)',
                        warning: '#D97706',
                        warningSubtle: 'rgba(217, 119, 6, 0.08)',
                        error: '#DC2626',
                        info: '#2563EB',
                    },
                    boxShadow: {
                        'level1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'level2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #FAFAFA; -webkit-font-smoothing: antialiased; overflow: hidden; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            overflow: hidden;
        }
        
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            opacity: 0;
            animation: confetti-fall 2s linear infinite;
        }
        
        @keyframes confetti-fall {
            0% {
                transform: translateY(-10px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .celebration-icon {
            animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .delay-1 { animation-delay: 0.2s; opacity: 0; }
        .delay-2 { animation-delay: 0.3s; opacity: 0; }
        .delay-3 { animation-delay: 0.4s; opacity: 0; }
        .delay-4 { animation-delay: 0.5s; opacity: 0; }
    </style>
</head>
<body>

    <div class="confetti-container" id="confetti-container"></div>

    <div id="celebration-screen" class="fixed inset-0 bg-primary z-50 flex items-center justify-center px-4">
        <div class="w-full max-w-md flex flex-col items-center">
            
            <div class="celebration-icon w-[88px] h-[88px] rounded-full bg-brandBlue flex items-center justify-center mb-6">
                <i class="fa-solid fa-circle-check text-white text-[56px]"></i>
            </div>

            <h1 class="font-serif text-[36px] font-bold text-textPrimary text-center leading-tight mb-3 fade-in-up delay-1">
                You're live.
            </h1>

            <p class="font-sans text-[16px] text-textSecondary text-center leading-relaxed mb-8 fade-in-up delay-2">
                Your profile is now visible to customers in Atlanta.
            </p>

            <div class="w-full bg-surface rounded-[16px] p-4 border border-borderSubtle shadow-level1 mb-4 fade-in-up delay-3">
                <div class="grid grid-cols-3 divide-x divide-borderSubtle">
                    <div class="flex flex-col items-center justify-center px-2 py-2">
                        <p class="font-sans text-[11px] font-medium text-textTertiary uppercase tracking-wider mb-1">PROFILE BADGES</p>
                        <p class="font-sans text-[18px] font-bold text-textPrimary">3</p>
                    </div>
                    <div class="flex flex-col items-center justify-center px-2 py-2">
                        <p class="font-sans text-[11px] font-medium text-textTertiary uppercase tracking-wider mb-1">SERVICES</p>
                        <p class="font-sans text-[18px] font-bold text-textPrimary">4</p>
                    </div>
                    <div class="flex flex-col items-center justify-center px-2 py-2">
                        <p class="font-sans text-[11px] font-medium text-textTertiary uppercase tracking-wider mb-1">RADIUS</p>
                        <p class="font-sans text-[18px] font-bold text-textPrimary">15 mi</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-center gap-2 mb-8 fade-in-up delay-3">
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-brandBlueSubtle">
                    <span class="font-sans text-[12px] font-medium text-brandBlue">Verified</span>
                    <i class="fa-solid fa-check text-brandBlue text-[10px]"></i>
                </span>
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-successSubtle">
                    <span class="font-sans text-[12px] font-medium text-success">Licensed</span>
                    <i class="fa-solid fa-check text-success text-[10px]"></i>
                </span>
                <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-successSubtle">
                    <span class="font-sans text-[12px] font-medium text-success">Insured</span>
                    <i class="fa-solid fa-check text-success text-[10px]"></i>
                </span>
            </div>

            <div class="w-full flex flex-col gap-2 fade-in-up delay-4">
                <button class="w-full h-[48px] bg-brandBlue hover:bg-brandBlueHover active:bg-brandBlueHover text-white font-sans text-[15px] font-semibold rounded-[12px] transition-colors">
                    See My Profile
                </button>
                <button class="w-full h-[48px] text-brandBlue hover:text-brandBlueHover active:text-brandBlueHover font-sans text-[15px] font-semibold transition-colors">
                    Go to Today
                </button>
            </div>

        </div>
    </div>

    <script>
        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#339DC7', '#6BB8D4', '#2B85A9', '#7DC9E3'];
            const confettiCount = 50;

            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
                container.appendChild(confetti);
            }
        }

        window.addEventListener('load', function() {
            createConfetti();
        });
    </script>

</body></html>
