<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            elevated: '#FFFFFF'
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8'
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4'
                        },
                        brand: {
                            default: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51, 157, 199, 0.1)'
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            error: '#DC2626',
                            info: '#2563EB',
                            successSubtle: 'rgba(22, 163, 74, 0.10)',
                            warningSubtle: 'rgba(217, 119, 6, 0.10)'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24)',
                        'level-2': '0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #FAFAFA; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-text-primary antialiased flex justify-center w-full">
    <div class="w-full max-w-[375px] min-h-[840px] bg-background-primary relative overflow-x-hidden flex flex-col">
        
        <header id="today-header" class="bg-background-elevated border-b border-border-subtle px-6 pt-6 pb-5">
            <h1 class="font-serif text-[26px] font-bold text-text-primary mb-2 leading-tight">
                Good morning, Marcus.
            </h1>
            
            <div class="flex items-center gap-2 mb-5">
                <span class="font-sans text-[14px] text-text-secondary">Thursday, May 2</span>
                <span class="text-text-tertiary">·</span>
                <span class="font-sans text-[14px] text-semantic-success font-medium">No jobs yet</span>
            </div>

            <div id="team-status" class="flex gap-2 mb-5 overflow-x-auto hide-scrollbar pb-1">
                <div class="flex items-center gap-2 px-3 py-2 rounded-full border border-border-default bg-background-primary whitespace-nowrap">
                    <div class="w-2 h-2 rounded-full bg-text-tertiary"></div>
                    <span class="font-sans text-[13px] font-medium text-text-primary">Jordan</span>
                    <span class="font-sans text-[12px] text-text-tertiary">Available</span>
                </div>
                <div class="flex items-center gap-2 px-3 py-2 rounded-full border border-border-default bg-background-primary whitespace-nowrap">
                    <div class="w-2 h-2 rounded-full bg-text-tertiary"></div>
                    <span class="font-sans text-[13px] font-medium text-text-primary">Kayla</span>
                    <span class="font-sans text-[12px] text-text-tertiary">Available</span>
                </div>
                <div class="flex items-center gap-2 px-3 py-2 rounded-full border border-border-default bg-background-primary whitespace-nowrap">
                    <div class="w-2 h-2 rounded-full bg-text-tertiary"></div>
                    <span class="font-sans text-[13px] font-medium text-text-primary">Devon</span>
                    <span class="font-sans text-[12px] text-text-tertiary">Available</span>
                </div>
            </div>

            <div id="summary-stats" class="grid grid-cols-3 gap-3">
                <div class="flex flex-col">
                    <span class="font-sans text-[12px] text-text-tertiary mb-1">In Progress</span>
                    <span class="font-sans text-[20px] font-semibold text-text-tertiary">0</span>
                </div>
                <div class="flex flex-col">
                    <span class="font-sans text-[12px] text-text-tertiary mb-1">Completed</span>
                    <span class="font-sans text-[20px] font-semibold text-text-tertiary">0</span>
                </div>
                <div class="flex flex-col">
                    <span class="font-sans text-[12px] text-text-tertiary mb-1">Unassigned</span>
                    <span class="font-sans text-[20px] font-semibold text-text-tertiary">0</span>
                </div>
            </div>
        </header>

        <main id="today-main" class="flex-1 overflow-y-auto px-6">
            
            <div id="section-label" class="pt-6 pb-4">
                <h2 class="font-sans text-[11px] font-semibold text-text-tertiary tracking-wide uppercase">TODAY'S JOBS</h2>
            </div>

            <section id="empty-state-content" class="w-full flex flex-col items-center text-center pt-12 pb-24">
                <div class="w-[80px] h-[80px] rounded-full bg-brand-subtle flex items-center justify-center mb-6">
                    <i class="fa-solid fa-calendar-days text-[36px] text-brand-default"></i>
                </div>
                
                <h3 class="font-serif text-[22px] font-bold text-text-primary mb-3 leading-tight">
                    Nothing on the board yet.
                </h3>
                
                <p class="font-sans text-[15px] text-text-secondary mb-8 leading-relaxed max-w-[280px]">
                    Add your team and start taking bookings. This fills up fast.
                </p>
                
                <button class="w-full h-[48px] bg-brand-default text-white rounded-full font-sans text-[15px] font-semibold active:bg-brand-hover transition-colors shadow-sm mb-3">
                    Add Team Member
                </button>

                <button class="w-full h-[48px] bg-transparent text-brand-default rounded-full font-sans text-[15px] font-medium active:bg-brand-subtle transition-colors flex items-center justify-center gap-1">
                    <span>Share booking link</span>
                    <i class="fa-solid fa-arrow-right text-[13px]"></i>
                </button>
            </section>

        </main>

        <nav id="bottom-navigation" class="bg-background-elevated border-t border-border-subtle px-6 py-3 flex items-center justify-around">
            <button class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                <i class="fa-solid fa-calendar-day text-[20px] text-brand-default"></i>
                <span class="font-sans text-[10px] font-medium text-brand-default">Today</span>
            </button>
            <button class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                <i class="fa-solid fa-calendar text-[20px] text-text-tertiary"></i>
                <span class="font-sans text-[10px] font-medium text-text-tertiary">Schedule</span>
            </button>
            <button class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                <i class="fa-solid fa-users text-[20px] text-text-tertiary"></i>
                <span class="font-sans text-[10px] font-medium text-text-tertiary">Team</span>
            </button>
            <button class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                <i class="fa-solid fa-chart-line text-[20px] text-text-tertiary"></i>
                <span class="font-sans text-[10px] font-medium text-text-tertiary">Stats</span>
            </button>
            <button class="flex flex-col items-center gap-1 min-w-[44px] min-h-[44px] justify-center active:opacity-60 transition-opacity">
                <i class="fa-solid fa-gear text-[20px] text-text-tertiary"></i>
                <span class="font-sans text-[10px] font-medium text-text-tertiary">Settings</span>
            </button>
        </nav>

    </div>
</body>
</html>
