<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOAM Welcome Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            surface: '#FFFFFF',
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8',
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4',
                        },
                        brand: {
                            primary: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51,157,199,0.10)',
                            card2: '#6BB8D4',
                            card3: '#E1F0F7',
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            error: '#DC2626',
                            info: '#2563EB',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        playfair: ['Playfair Display', 'serif'],
                    },
                    spacing: {
                        'screen-w': '375px',
                        'screen-h': '840px',
                    },
                    animation: {
                        'slide-up': 'slideUp 400ms ease-out forwards',
                        'fade-in': 'fadeIn 300ms ease-out forwards',
                        'float-1': 'float 6s ease-in-out infinite',
                        'float-2': 'float 8s ease-in-out infinite reverse',
                        'float-3': 'float 7s ease-in-out infinite 1s',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(var(--tw-rotate))' },
                            '50%': { transform: 'translateY(-10px) rotate(var(--tw-rotate))' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { margin: 0; padding: 0; background-color: #FAFAFA; overscroll-behavior-y: none; }
        
        /* Custom Apple/Google Icon Colors */
        .apple-icon { color: #000000; }
        /* Using multi-color SVG for Google later, fallback class here */
        .google-icon-wrapper { display: inline-flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-background-primary flex items-center justify-center min-h-[100dvh] antialiased">

    <!-- Mobile Container Wrapper -->
    <main id="main-container" class="w-full max-w-[375px] h-[840px] max-h-[100dvh] bg-background-primary relative flex flex-col overflow-hidden mx-auto shadow-[0_0_40px_rgba(0,0,0,0.05)] sm:rounded-[40px] sm:my-8 sm:h-[840px] sm:border-[8px] sm:border-gray-900">
        
        <!-- Top 55% - Illustration Area -->
        <section id="illustration-area" class="h-[55%] w-full relative flex items-center justify-center overflow-hidden bg-background-primary">
            <!-- Background decorative blur -->
            <div class="absolute w-[200px] h-[200px] bg-brand-subtle rounded-full blur-[60px] top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
            
            <!-- Abstract Cards Composition -->
            <div class="relative w-full h-full flex items-center justify-center">
                
                <!-- Card 3 (Back/Lightest) -->
                <div class="absolute w-[180px] h-[240px] bg-brand-card3 rounded-[24px] shadow-sm transform -rotate-12 translate-x-[-30px] translate-y-[-20px] animate-float-3 border border-white/40 backdrop-blur-sm"></div>
                
                <!-- Card 2 (Middle/Medium) -->
                <div class="absolute w-[190px] h-[260px] bg-brand-card2 rounded-[24px] shadow-md transform rotate-6 translate-x-[40px] translate-y-[10px] animate-float-2 border border-white/30 backdrop-blur-sm opacity-90"></div>
                
                <!-- Card 1 (Front/Darkest) -->
                <div class="absolute w-[200px] h-[280px] bg-brand-primary rounded-[24px] shadow-[0_12px_40px_rgba(51,157,199,0.3)] transform -rotate-3 translate-x-[-10px] translate-y-[30px] animate-float-1 border border-white/20 backdrop-blur-md flex flex-col justify-between p-6">
                    <!-- Subtle geometric details inside front card to make it look premium -->
                    <div class="w-8 h-8 rounded-full bg-white/20"></div>
                    <div class="space-y-3">
                        <div class="w-3/4 h-2 rounded-full bg-white/30"></div>
                        <div class="w-1/2 h-2 rounded-full bg-white/20"></div>
                    </div>
                </div>
                
            </div>
        </section>

        <!-- Bottom 45% - Content & CTA Area -->
        <section id="action-area" class="h-[45%] w-full bg-background-surface rounded-t-[20px] shadow-[0_-4px_24px_rgba(0,0,0,0.04)] flex flex-col relative z-10 animate-slide-up">
            
            <!-- Handle for visual grounding (optional, common in bottom sheets) -->
            <div class="w-full flex justify-center pt-3 pb-1">
                <div class="w-[36px] h-[4px] rounded-full bg-border-subtle"></div>
            </div>

            <!-- Value Proposition Copy -->
            <div id="value-prop" class="px-6 pt-[20px] pb-6 flex-shrink-0 animate-fade-in" style="animation-delay: 200ms;">
                <h2 class="font-playfair text-[32px] font-[700] text-text-primary leading-[1.1] mb-3">
                    Your car deserves better.
                </h2>
                <p class="font-inter text-[16px] font-[400] text-text-secondary leading-[1.5] max-w-[320px]">
                    Find the best mobile detailers near you and book in seconds.
                </p>
            </div>

            <!-- Action Buttons -->
            <div id="primary-actions" class="px-6 flex flex-col gap-[12px] flex-shrink-0 animate-fade-in" style="animation-delay: 300ms;">
                <button type="button" class="w-full h-[48px] bg-brand-primary text-white font-inter text-[14px] font-[600] rounded-[8px] flex items-center justify-center transition-colors hover:bg-brand-hover active:bg-brand-hover active:scale-[0.98]">
                    Get Started
                </button>
                <button type="button" class="w-full h-[48px] bg-transparent text-brand-primary font-inter text-[14px] font-[600] rounded-[8px] border border-brand-primary flex items-center justify-center transition-colors active:bg-brand-subtle active:scale-[0.98]">
                    Log In
                </button>
            </div>

            <!-- Social Auth Divider -->
            <div id="social-divider" class="px-6 mt-[16px] mb-[16px] flex items-center justify-center flex-shrink-0 animate-fade-in" style="animation-delay: 400ms;">
                <div class="flex-grow h-[1px] bg-border-subtle"></div>
                <span class="px-3 font-inter text-[12px] font-[400] text-text-tertiary">or</span>
                <div class="flex-grow h-[1px] bg-border-subtle"></div>
            </div>

            <!-- Social Auth Buttons -->
            <div id="social-actions" class="px-6 flex flex-col gap-[8px] flex-shrink-0 animate-fade-in" style="animation-delay: 500ms;">
                <button type="button" class="w-full h-[48px] bg-white text-text-primary font-inter text-[14px] font-[500] rounded-[8px] border border-border-default flex items-center justify-center relative transition-colors active:bg-background-secondary active:scale-[0.98]">
                    <i class="fa-brands fa-apple text-[18px] absolute left-4 apple-icon"></i>
                    Continue with Apple
                </button>
                <button type="button" class="w-full h-[48px] bg-white text-text-primary font-inter text-[14px] font-[500] rounded-[8px] border border-border-default flex items-center justify-center relative transition-colors active:bg-background-secondary active:scale-[0.98]">
                    <span class="absolute left-4 google-icon-wrapper">
                        <!-- Custom Google SVG for accurate branding colors -->
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M17.64 9.20455C17.64 8.56636 17.5827 7.95273 17.4764 7.36364H9V10.845H13.8436C13.635 11.97 13.0009 12.9232 12.0477 13.5614V15.8195H14.9564C16.6582 14.2527 17.64 11.9455 17.64 9.20455Z" fill="#4285F4"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M9 18C11.43 18 13.4673 17.1941 14.9564 15.8195L12.0477 13.5614C11.2418 14.1014 10.2109 14.4205 9 14.4205C6.65591 14.4205 4.67182 12.8373 3.96409 10.71H0.957275V13.0418C2.43818 15.9832 5.48182 18 9 18Z" fill="#34A853"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M3.96409 10.71C3.78409 10.17 3.68182 9.59318 3.68182 9C3.68182 8.40682 3.78409 7.83 3.96409 7.29H0.957275V4.95818C0.347727 6.17318 0 7.54773 0 9C0 10.4523 0.347727 11.8268 0.957275 13.0418L3.96409 10.71Z" fill="#FBBC05"/>
                            <path fill-rule="evenodd" clip-rule="evenodd" d="M9 3.57955C10.3214 3.57955 11.5077 4.03364 12.4405 4.92545L15.0218 2.34409C13.4632 0.891818 11.4259 0 9 0C5.48182 0 2.43818 2.01682 0.957275 4.95818L3.96409 7.29C4.67182 5.16273 6.65591 3.57955 9 3.57955Z" fill="#EA4335"/>
                        </svg>
                    </span>
                    Continue with Google
                </button>
            </div>

            <!-- Spacer to push terms to bottom if needed -->
            <div class="flex-grow"></div>

            <!-- Terms Footer -->
            <div id="terms-footer" class="w-full pb-[16px] pt-4 px-6 flex-shrink-0 mt-auto animate-fade-in" style="animation-delay: 600ms;">
                <p class="font-inter text-[11px] font-[400] text-text-tertiary text-center leading-[1.4]">
                    By continuing, you agree to our Terms and Privacy Policy.
                </p>
            </div>

        </section>

        <!-- Hidden Meta-Data Section -->
        <div id="hidden-meta" class="hidden" aria-hidden="true">
            <span data-screen-type="welcome">Welcome / Value Prop</span>
            <span data-next-action="signup">Primary CTA leads to Sign Up</span>
        </div>

    </main>

</body>
</html>
