<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FOAM — The Operating System for Auto Detailing</title>
<meta name="description" content="Customers book trusted mobile detailers and local shops. Operators run bookings, payments, customers, crews, routes, and bays from one place." />
<link rel="icon" href="assets/favicon-cloud.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: #FAFAFA;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #0A0A0A;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::selection { background: rgba(51,157,199,0.2); }
  a { text-decoration: none; color: inherit; }
  button { font-family: inherit; }
  img { max-width: 100%; height: auto; display: block; }
  @keyframes shine {
    0% { left: -60%; }
    60%, 100% { left: 140%; }
  }
  .shine-badge { position: relative; overflow: hidden; }
  .shine-badge::after {
    content: '';
    position: absolute; top: 0; left: -60%;
    width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    animation: shine 2.4s ease-in-out infinite;
    pointer-events: none;
  }
  @media (max-width: 768px) {
    .desktop-nav { display: none !important; }
    .hamburger  { display: flex !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<!-- scripts load and execute in DOM order; Babel processes src= scripts sequentially -->
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages/HomePage.jsx"></script>
<script type="text/babel" src="pages/AudiencePages.jsx"></script>
<script type="text/babel" src="pages/OtherPages.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
