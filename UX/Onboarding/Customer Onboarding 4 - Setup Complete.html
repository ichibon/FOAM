<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer: Setup Complete</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        primary: '#FAFAFA',
                        secondary: '#F4F4F5',
                        elevated: '#FFFFFF',
                        borderSubtle: '#E4E4E7',
                        borderDefault: '#D4D4D8',
                        textPrimary: '#0A0A0A',
                        textSecondary: '#525252',
                        textTertiary: '#A3A3A3',
                        textDisabled: '#D4D4D4',
                        foamBlue: '#339DC7',
                        foamBlueHover: '#2B85A9',
                        foamBlueSubtle: 'rgba(51,157,199,0.10)',
                        accentSubtle: '#E1F0F7',
                        success: '#16A34A',
                        warning: '#D97706',
                        error: '#DC2626',
                        info: '#2563EB',
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'level-2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFAFA;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (max-width: 375px) {
            .mobile-container {
                max-width: 375px;
                margin: 0 auto;
                min-height: 840px;
                background-color: #FAFAFA;
                position: relative;
            }
        }
    </style>
</head>
<body class="text-textPrimary bg-primary selection:bg-foamBlue selection:text-white m-0 p-0">

    <div id="app-container" class="w-full max-w-[375px] mx-auto min-h-[840px] bg-primary relative flex flex-col shadow-2xl md:shadow-none overflow-hidden">
        
        <!-- Main Content Area - Centered -->
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar flex flex-col items-center justify-center px-4 pb-[180px] pt-8 relative z-10">
            
            <!-- Confetti Background Effect (Subtle) -->
            <div class="absolute inset-0 pointer-events-none overflow-hidden z-0 flex items-center justify-center opacity-50">
                <div class="w-[300px] h-[300px] bg-foamBlueSubtle rounded-full blur-[60px]"></div>
            </div>

            <div class="relative z-10 flex flex-col items-center w-full">
                <!-- Success Icon -->
                <div id="success-icon" class="w-[72px] h-[72px] bg-foamBlue rounded-full flex items-center justify-center mb-[24px] shadow-level-2 transform hover:scale-105 transition-transform duration-300">
                    <i class="fa-solid fa-check text-[32px] text-white"></i>
                </div>

                <!-- Headline & Body Section -->
                <section id="text-section" class="flex flex-col items-center text-center w-full mb-[40px]">
                    <h1 class="font-serif text-[32px] font-bold text-textPrimary leading-tight mb-[12px]">
                        You're all set.
                    </h1>
                    <p class="font-sans text-[16px] text-textSecondary leading-relaxed">
                        Let's find you a detailer.
                    </p>
                </section>

                <!-- Stats Row Card -->
                <section id="stats-card" class="w-full bg-elevated rounded-[16px] p-[20px] shadow-level-1 border border-borderSubtle mb-[32px]">
                    <div class="flex flex-row items-center justify-between w-full">
                        
                        <!-- Column 1: Vehicle -->
                        <div class="flex flex-col items-center flex-1">
                            <span class="font-sans text-[12px] text-textTertiary mb-[4px] uppercase tracking-wider">Vehicle saved</span>
                            <span class="font-sans text-[14px] font-semibold text-textPrimary text-center">Audi Q5</span>
                        </div>

                        <!-- Divider -->
                        <div class="w-[1px] h-[32px] bg-borderSubtle mx-[8px]"></div>

                        <!-- Column 2: Payment -->
                        <div class="flex flex-col items-center flex-1">
                            <span class="font-sans text-[12px] text-textTertiary mb-[4px] uppercase tracking-wider">Payment</span>
                            <span class="font-sans text-[14px] font-semibold text-textPrimary flex items-center gap-[4px]">
                                Visa <span class="text-[10px] opacity-70">····</span>4242
                            </span>
                        </div>

                        <!-- Divider -->
                        <div class="w-[1px] h-[32px] bg-borderSubtle mx-[8px]"></div>

                        <!-- Column 3: Location -->
                        <div class="flex flex-col items-center flex-1">
                            <span class="font-sans text-[12px] text-textTertiary mb-[4px] uppercase tracking-wider">Location</span>
                            <span class="font-sans text-[14px] font-semibold text-textPrimary text-center">Buckhead, ATL</span>
                        </div>

                    </div>
                </section>
                
                <!-- Discovery Preview Section (Extrapolated for detail) -->
                <section id="discovery-preview" class="w-full flex flex-col gap-4 opacity-80 pointer-events-none mb-8">
                    <div class="flex items-center justify-between w-full mb-2">
                        <h3 class="font-sans text-[14px] font-semibold text-textSecondary uppercase tracking-wider">Top Detailers Near You</h3>
                    </div>
                    
                    <!-- Mock Detailer Card 1 -->
                    <div class="w-full bg-elevated rounded-[12px] p-[12px] border border-borderSubtle flex items-center gap-[12px]">
                        <div class="w-[48px] h-[48px] rounded-[8px] bg-secondary overflow-hidden">
                            <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/ac63d99f69-c2eb2af2f3cb1378f0dc.png" alt="Clean modern car detailing business logo minimal white background" />
                        </div>
                        <div class="flex-1">
                            <div class="font-sans text-[14px] font-semibold text-textPrimary">Elite Auto Spa</div>
                            <div class="font-sans text-[12px] text-textSecondary flex items-center gap-1">
                                <i class="fa-solid fa-star text-foamBlue text-[10px]"></i> 4.9 (124) · 2.1 mi
                            </div>
                        </div>
                    </div>
                    
                    <!-- Mock Detailer Card 2 -->
                    <div class="w-full bg-elevated rounded-[12px] p-[12px] border border-borderSubtle flex items-center gap-[12px]">
                        <div class="w-[48px] h-[48px] rounded-[8px] bg-secondary overflow-hidden">
                            <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/b3281a1eda-f1e677c077a77b8952e5.png" alt="Premium mobile car wash logo simple clean icon" />
                        </div>
                        <div class="flex-1">
                            <div class="font-sans text-[14px] font-semibold text-textPrimary">Pristine Mobile</div>
                            <div class="font-sans text-[12px] text-textSecondary flex items-center gap-1">
                                <i class="fa-solid fa-star text-foamBlue text-[10px]"></i> 5.0 (89) · 3.4 mi
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Fixed Action Footer Section -->
        <footer id="action-footer" class="fixed bottom-0 w-full max-w-[375px] bg-gradient-to-t from-primary via-primary to-transparent pt-12 pb-[32px] px-[16px] z-20">
            <button type="button" class="w-full h-[48px] bg-foamBlue hover:bg-foamBlueHover active:bg-foamBlueHover text-white font-sans text-[16px] font-semibold rounded-[12px] transition-colors duration-200 shadow-level-2 flex items-center justify-center gap-[8px]">
                <i class="fa-solid fa-map-pin text-[16px]"></i>
                Find a Detailer
            </button>
        </footer>

    </div>

</body>
</html>
