<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Required</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            elevated: '#FFFFFF'
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8'
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4'
                        },
                        brand: {
                            default: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51, 157, 199, 0.1)'
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            warningSubtle: 'rgba(217, 119, 6, 0.10)',
                            error: '#DC2626',
                            errorSubtle: 'rgba(220, 38, 38, 0.10)',
                            info: '#2563EB',
                            successSubtle: 'rgba(22, 163, 74, 0.10)'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24)',
                        'level-2': '0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23)',
                        'level-3': '0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #FAFAFA; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-text-primary antialiased flex justify-center w-full bg-background-primary m-0 p-0">
    <div class="w-full max-w-[375px] min-h-[840px] bg-background-primary relative flex flex-col overflow-hidden shadow-level-3">
        
        <main id="app_update_required_screen" class="flex-1 overflow-y-auto hide-scrollbar px-4 pt-20 pb-8 flex flex-col items-center">
            
            <div id="update_icon" class="w-20 h-20 rounded-full bg-brand-subtle flex items-center justify-center mb-8">
                <i data-lucide="refresh-cw" class="w-12 h-12 text-brand-default"></i>
            </div>

            <h1 class="font-serif text-[28px] font-bold text-text-primary text-center mb-4 leading-tight px-4">Time for an update.</h1>
            
            <p class="font-sans text-[16px] text-text-secondary text-center mb-8 max-w-[300px] leading-relaxed">A new version of FOAM is available. Update to keep going.</p>

            <section id="whats_new_card" class="w-full bg-background-elevated rounded-2xl p-4 shadow-level-1 border border-border-subtle mt-8 mb-6 mx-4">
                <div class="mb-4">
                    <span class="font-sans text-[11px] font-medium text-brand-default uppercase tracking-wide">WHAT'S NEW</span>
                </div>
                
                <div class="space-y-2">
                    <div class="flex items-start gap-3">
                        <i class="fa-solid fa-check text-brand-default text-[16px] mt-0.5 flex-shrink-0"></i>
                        <p class="font-sans text-[14px] text-text-secondary leading-relaxed">Faster booking flow</p>
                    </div>
                    
                    <div class="flex items-start gap-3">
                        <i class="fa-solid fa-check text-brand-default text-[16px] mt-0.5 flex-shrink-0"></i>
                        <p class="font-sans text-[14px] text-text-secondary leading-relaxed">Improved payment reliability</p>
                    </div>
                    
                    <div class="flex items-start gap-3">
                        <i class="fa-solid fa-check text-brand-default text-[16px] mt-0.5 flex-shrink-0"></i>
                        <p class="font-sans text-[14px] text-text-secondary leading-relaxed">Bug fixes and performance improvements</p>
                    </div>
                </div>
            </section>

            <section id="update_action" class="w-full mt-6">
                <button class="w-full h-12 bg-brand-default text-white rounded-xl text-[14px] font-semibold shadow-sm hover:bg-brand-hover transition-colors flex items-center justify-center">
                    Update Now
                </button>
                
                <p class="font-sans text-[12px] text-text-tertiary text-center mt-4">Version 2.4.1 is now available.</p>
            </section>

        </main>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
