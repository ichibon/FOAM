<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOAM Operation Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            surface: '#FFFFFF',
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8',
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4',
                        },
                        brand: {
                            primary: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51,157,199,0.10)',
                            card2: '#6BB8D4',
                            card3: '#E1F0F7',
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            error: '#DC2626',
                            info: '#2563EB',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        playfair: ['Playfair Display', 'serif'],
                    },
                    spacing: {
                        'screen-w': '375px',
                        'screen-h': '840px',
                    },
                    animation: {
                        'slide-up': 'slideUp 400ms ease-out forwards',
                        'fade-in': 'fadeIn 300ms ease-out forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { margin: 0; padding: 0; background-color: #FAFAFA; overscroll-behavior-y: none; }
    </style>
</head>
<body class="bg-background-primary flex items-center justify-center min-h-[100dvh] antialiased m-0 p-0">

    <main id="main-container" class="w-full max-w-[375px] h-[840px] max-h-[100dvh] bg-background-primary relative flex flex-col overflow-hidden mx-auto shadow-[0_0_40px_rgba(0,0,0,0.05)] sm:rounded-[40px] sm:my-8 sm:h-[840px] sm:border-[8px] sm:border-gray-900">
        
        <header id="screen_header" class="w-full pt-[64px] pb-[16px] px-[16px] flex-shrink-0 relative z-10 animate-fade-in bg-background-primary">
            <button class="w-[44px] h-[44px] flex items-center justify-start absolute top-[54px] left-[6px] -ml-[8px] text-text-primary transition-transform active:scale-[0.95]">
                <i data-lucide="chevron-left" class="w-[20px] h-[20px]"></i>
            </button>
            
            <div class="w-full flex flex-col items-center mt-[16px]">
                <span class="font-inter text-[12px] text-text-tertiary mb-[8px]">Step 2 of 4</span>
                <div class="w-full h-[4px] bg-[#E4E4E7] rounded-[8px] overflow-hidden">
                    <div class="h-full bg-brand-primary w-[50%] rounded-[8px]"></div>
                </div>
            </div>

            <div class="mt-[20px]">
                <h1 class="font-playfair text-[26px] font-[700] text-text-primary leading-[1.2] tracking-tight">
                    Build your operation.
                </h1>
                <p class="font-inter text-[15px] font-[400] text-text-secondary mt-[8px]">
                    Add your vans and locations. You can always add more later.
                </p>
            </div>
        </header>

        <section id="operation_builder" class="w-full px-[16px] flex flex-col flex-grow overflow-y-auto pb-[160px] animate-slide-up bg-background-primary z-0" style="animation-delay: 100ms;">
            
            <div id="empty_state" class="w-full flex flex-col items-center justify-center mt-[40px]">
                <div class="flex items-center gap-[16px] mb-[12px]">
                    <i data-lucide="truck" class="w-[40px] h-[40px] text-[#D4D4D8]"></i>
                    <i data-lucide="building-2" class="w-[40px] h-[40px] text-[#D4D4D8]"></i>
                </div>
                
                <p class="font-inter text-[15px] font-[500] text-text-secondary text-center mb-[4px]">
                    No units added yet.
                </p>
                
                <p class="font-inter text-[13px] font-[400] text-text-tertiary text-center">
                    Add your first van or location below.
                </p>
            </div>

            <div class="flex flex-col gap-[12px] mt-[48px] w-full">
                <button id="add_van_btn" class="w-full h-[48px] bg-brand-primary text-background-surface font-inter text-[14px] font-[600] rounded-[8px] flex items-center justify-center gap-[8px] transition-transform active:scale-[0.98] hover:bg-brand-hover shadow-[0_4px_12px_rgba(51,157,199,0.2)]">
                    <i data-lucide="truck" class="w-[20px] h-[20px]"></i>
                    Add a Van
                </button>

                <button id="add_location_btn" class="w-full h-[48px] bg-background-surface border-[2px] border-brand-primary text-brand-primary font-inter text-[14px] font-[600] rounded-[8px] flex items-center justify-center gap-[8px] transition-transform active:scale-[0.98] hover:bg-brand-subtle">
                    <i data-lucide="building-2" class="w-[20px] h-[20px]"></i>
                    Add a Location
                </button>
            </div>

        </section>

        <section id="primary_cta" class="absolute bottom-0 left-0 w-full bg-background-primary pt-[16px] pb-[24px] px-[16px] z-20 animate-fade-in" style="animation-delay: 200ms;">
            <div class="w-full absolute top-0 left-0 h-[24px] -mt-[24px] bg-gradient-to-t from-background-primary to-transparent pointer-events-none"></div>
            
            <button id="continue_btn" class="w-full h-[48px] bg-brand-primary opacity-40 text-background-surface font-inter text-[14px] font-[600] rounded-[8px] flex items-center justify-center transition-transform cursor-not-allowed" disabled>
                Continue
            </button>
            
            <div class="w-full text-center mt-[12px]">
                <p class="font-inter text-[12px] font-[400] text-text-tertiary">
                    Add at least one van or location to continue.
                </p>
            </div>
        </section>

    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
