<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOAM Splash Screen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            surface: '#FFFFFF',
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8',
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4',
                        },
                        brand: {
                            primary: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51,157,199,0.10)',
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            error: '#DC2626',
                            info: '#2563EB',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        playfair: ['Playfair Display', 'serif'],
                    },
                    spacing: {
                        'screen-w': '375px',
                        'screen-h': '840px',
                    },
                    animation: {
                        'fade-in-scale': 'fadeInScale 400ms ease-out forwards',
                        'fade-in': 'fadeIn 200ms ease-out forwards',
                    },
                    keyframes: {
                        fadeInScale: {
                            '0%': { opacity: '0', transform: 'scale(0.95)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { margin: 0; padding: 0; background-color: #FAFAFA; }
    </style>
</head>
<body class="bg-background-primary flex items-center justify-center min-h-[100dvh] antialiased">

    <!-- Mobile Container Wrapper -->
    <main id="main-container" class="w-full max-w-[375px] h-[840px] max-h-[100dvh] bg-background-primary relative flex flex-col items-center justify-center overflow-hidden mx-auto shadow-[0_0_40px_rgba(0,0,0,0.05)] sm:rounded-[40px] sm:my-8 sm:h-[840px] sm:border-[8px] sm:border-gray-900">
        
        <!-- Center Content -->
        <div id="brand-center" class="flex flex-col items-center justify-center z-10 w-full px-6">
            <h1 id="brand-wordmark" class="font-playfair text-[52px] font-[800] text-text-primary tracking-[-1px] leading-none mb-3 opacity-0 animate-fade-in-scale">
                FOAM
            </h1>
            <p id="brand-tagline" class="font-inter text-[16px] font-[400] text-text-secondary text-center opacity-0" style="animation: fadeIn 200ms ease-out 400ms forwards;">
                The operating system for clean cars.
            </p>
        </div>

        <!-- Bottom Content -->
        <div id="brand-footer" class="absolute bottom-[48px] left-0 w-full flex flex-col items-center justify-center z-10 opacity-0" style="animation: fadeIn 300ms ease-out 600ms forwards;">
            <!-- Custom Water Droplet Icon SVG -->
            <svg id="brand-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-2 text-brand-primary">
                <path d="M12 21.5C16.1421 21.5 19.5 18.1421 19.5 14C19.5 9 12 2.5 12 2.5C12 2.5 4.5 9 4.5 14C4.5 18.1421 7.85786 21.5 12 21.5Z" fill="currentColor"/>
                <path d="M15.5 14C15.5 15.933 13.933 17.5 12 17.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <p id="brand-company" class="font-inter text-[11px] font-[400] text-text-tertiary text-center">
                By FOAM Technologies
            </p>
        </div>

        <!-- Hidden Meta-Data Section (Required by prompt, invisible in UI) -->
        <div id="hidden-meta" class="hidden" aria-hidden="true">
            <span data-screen-type="splash">Splash Screen</span>
            <span data-next-screen="welcome">Auto-advance to Welcome</span>
            <span data-duration="1500ms">Duration</span>
        </div>

    </main>

    <script>
        // Auto-advance logic simulation (as requested in prompt)
        setTimeout(() => {
            console.log('Transitioning to Welcome Screen...');
            // In a real app, this would route to the next screen
            // window.location.href = '/welcome';
        }, 1500);
    </script>
</body>
</html>
