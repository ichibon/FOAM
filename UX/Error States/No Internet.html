<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Internet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            elevated: '#FFFFFF'
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8'
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4'
                        },
                        brand: {
                            default: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51, 157, 199, 0.1)'
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            error: '#DC2626',
                            info: '#2563EB',
                            successSubtle: 'rgba(22, 163, 74, 0.10)',
                            errorSubtle: 'rgba(220, 38, 38, 0.10)'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif']
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24)',
                        'level-2': '0 3px 6px rgba(0,0,0,0.16), 0 3px 6px rgba(0,0,0,0.23)',
                        'level-3': '0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23)'
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #FAFAFA; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="font-sans text-text-primary antialiased flex justify-center w-full bg-background-primary m-0 p-0">
    <div class="w-full max-w-[375px] min-h-[840px] bg-background-primary relative flex flex-col overflow-hidden">
        
        <main id="no_internet_screen" class="flex-1 flex flex-col items-center justify-center px-6 pb-24">
            
            <div id="offline_icon" class="mb-8">
                <i data-lucide="wifi-off" class="w-14 h-14 text-text-tertiary"></i>
            </div>

            <h1 class="font-serif text-[28px] font-bold text-text-primary text-center mb-4 leading-tight">You're offline.</h1>
            
            <p class="font-sans text-[16px] text-text-secondary text-center mb-10 max-w-[280px] leading-relaxed">Check your connection and we'll pick up where you left off.</p>

            <button id="try_again_cta" class="bg-brand-default text-white font-sans text-[16px] font-semibold px-6 h-12 rounded-full shadow-sm hover:bg-brand-hover transition-colors">
                Try Again
            </button>

        </main>

        <footer id="brand_footer" class="absolute bottom-6 left-0 right-0 flex justify-center">
            <span class="font-sans text-[16px] font-semibold text-text-tertiary">FOAM</span>
        </footer>

    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
