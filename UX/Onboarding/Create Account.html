<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOAM Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: {
                            primary: '#FAFAFA',
                            secondary: '#F4F4F5',
                            surface: '#FFFFFF',
                        },
                        border: {
                            subtle: '#E4E4E7',
                            default: '#D4D4D8',
                        },
                        text: {
                            primary: '#0A0A0A',
                            secondary: '#525252',
                            tertiary: '#A3A3A3',
                            disabled: '#D4D4D4',
                        },
                        brand: {
                            primary: '#339DC7',
                            hover: '#2B85A9',
                            subtle: 'rgba(51,157,199,0.10)',
                            card2: '#6BB8D4',
                            card3: '#E1F0F7',
                        },
                        semantic: {
                            success: '#16A34A',
                            warning: '#D97706',
                            error: '#DC2626',
                            info: '#2563EB',
                        }
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        playfair: ['Playfair Display', 'serif'],
                    },
                    spacing: {
                        'screen-w': '375px',
                        'screen-h': '840px',
                    },
                    animation: {
                        'slide-up': 'slideUp 400ms ease-out forwards',
                        'fade-in': 'fadeIn 300ms ease-out forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { margin: 0; padding: 0; background-color: #FAFAFA; overscroll-behavior-y: none; }
        
        /* Custom focus ring for inputs */
        input:focus {
            outline: none;
            border-color: #339DC7;
            box-shadow: 0 0 0 1px rgba(51,157,199,0.2);
        }
    </style>
</head>
<body class="bg-background-primary flex items-center justify-center min-h-[100dvh] antialiased">

    <!-- Mobile Container Wrapper -->
    <main id="main-container" class="w-full max-w-[375px] h-[840px] max-h-[100dvh] bg-background-primary relative flex flex-col overflow-hidden mx-auto shadow-[0_0_40px_rgba(0,0,0,0.05)] sm:rounded-[40px] sm:my-8 sm:h-[840px] sm:border-[8px] sm:border-gray-900">
        
        <!-- Header Section -->
        <header id="screen_header" class="w-full pt-[64px] pb-[24px] px-[16px] flex-shrink-0 relative z-10 animate-fade-in bg-background-primary">
            <!-- Back Button -->
            <button class="w-[44px] h-[44px] flex items-center justify-start absolute top-[54px] left-[6px] -ml-[8px] text-text-primary transition-transform active:scale-[0.95]">
                <i data-lucide="chevron-left" class="w-[20px] h-[20px]"></i>
            </button>
            
            <div class="mt-[24px] pl-[16px]">
                <h1 class="font-inter text-[20px] font-[600] text-text-primary leading-[1.2] tracking-tight">
                    Create your account
                </h1>
                <p class="font-inter text-[14px] font-[400] text-text-secondary mt-[8px]">
                    Already have an account? <a href="#" class="text-brand-primary underline decoration-brand-primary/30 underline-offset-4 hover:decoration-brand-primary transition-colors">Log in</a>
                </p>
            </div>
        </header>

        <!-- Form Section -->
        <section id="signup_form" class="w-full px-[16px] flex flex-col flex-grow overflow-y-auto pb-[120px] animate-slide-up bg-background-primary z-0" style="animation-delay: 100ms;">
            
            <form class="flex flex-col gap-[16px] w-full mt-[8px]">
                
                <!-- Full Name Field -->
                <div class="flex flex-col gap-[8px]">
                    <label for="fullName" class="font-inter text-[12px] font-[500] text-text-tertiary ml-[4px]">Full name</label>
                    <div class="relative w-full">
                        <input 
                            type="text" 
                            id="fullName" 
                            placeholder="Marcus Thompson" 
                            class="w-full h-[52px] bg-background-surface border border-border-subtle rounded-[12px] px-[16px] font-inter text-[15px] text-text-primary placeholder:text-text-tertiary transition-all duration-200"
                            required
                        >
                    </div>
                </div>

                <!-- Email Field -->
                <div class="flex flex-col gap-[8px]">
                    <label for="email" class="font-inter text-[12px] font-[500] text-text-tertiary ml-[4px]">Email</label>
                    <div class="relative w-full">
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="marcus@example.com" 
                            class="w-full h-[52px] bg-background-surface border border-border-subtle rounded-[12px] px-[16px] font-inter text-[15px] text-text-primary placeholder:text-text-tertiary transition-all duration-200"
                            required
                        >
                    </div>
                </div>

                <!-- Password Field -->
                <div class="flex flex-col gap-[8px]">
                    <label for="password" class="font-inter text-[12px] font-[500] text-text-tertiary ml-[4px]">Password</label>
                    <div class="relative w-full">
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="8+ characters" 
                            class="w-full h-[52px] bg-background-surface border border-border-subtle rounded-[12px] pl-[16px] pr-[44px] font-inter text-[15px] text-text-primary placeholder:text-text-tertiary transition-all duration-200"
                            required
                        >
                        <button type="button" id="togglePassword" class="absolute right-[4px] top-[4px] w-[44px] h-[44px] flex items-center justify-center text-text-tertiary hover:text-text-secondary transition-colors">
                            <i data-lucide="eye" class="w-[20px] h-[20px]" id="eyeIcon"></i>
                        </button>
                    </div>
                    <p class="font-inter text-[11px] font-[400] text-text-tertiary ml-[4px]">At least 8 characters</p>
                </div>

            </form>

        </section>

        <!-- Bottom Fixed CTA Section -->
        <section id="primary_cta" class="absolute bottom-0 left-0 w-full bg-background-primary pt-[16px] pb-[24px] px-[16px] z-20 animate-fade-in" style="animation-delay: 200ms;">
            <div class="w-full absolute top-0 left-0 h-[24px] -mt-[24px] bg-gradient-to-t from-background-primary to-transparent pointer-events-none"></div>
            
            <button class="w-full h-[48px] bg-brand-primary text-background-surface font-inter text-[14px] font-[600] rounded-[8px] flex items-center justify-center transition-transform active:scale-[0.98] hover:bg-brand-hover shadow-[0_4px_12px_rgba(51,157,199,0.2)]">
                Create Account
            </button>
            
            <div id="trust_signal" class="w-full text-center mt-[12px]">
                <p class="font-inter text-[12px] font-[400] text-text-tertiary">
                    We'll never sell your data. Ever.
                </p>
            </div>
        </section>

    </main>

    <!-- Scripts -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Password Toggle Logic
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            toggleButton.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Toggle icon
                if (type === 'password') {
                    eyeIcon.setAttribute('data-lucide', 'eye');
                } else {
                    eyeIcon.setAttribute('data-lucide', 'eye-off');
                }
                lucide.createIcons();
            });
        });
    </script>
</body>
</html>
