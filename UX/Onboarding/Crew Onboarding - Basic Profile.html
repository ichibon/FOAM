<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crew: Basic Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        mono: ['Courier New', 'monospace'],
                    },
                    colors: {
                        primary: '#FAFAFA',
                        secondary: '#F4F4F5',
                        elevated: '#FFFFFF',
                        borderSubtle: '#E4E4E7',
                        borderDefault: '#D4D4D8',
                        textPrimary: '#0A0A0A',
                        textSecondary: '#525252',
                        textTertiary: '#A3A3A3',
                        textDisabled: '#D4D4D4',
                        foamBlue: '#339DC7',
                        foamBlueHover: '#2B85A9',
                        foamBlueSubtle: 'rgba(51,157,199,0.10)',
                        accentSubtle: '#E1F0F7',
                        success: '#16A34A',
                        warning: '#D97706',
                        error: '#DC2626',
                        info: '#2563EB',
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'level-2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                        'sheet': '0 -4px 20px -2px rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFAFA;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (max-width: 375px) {
            .mobile-container {
                max-width: 375px;
                margin: 0 auto;
                min-height: 840px;
                background-color: #FAFAFA;
                position: relative;
            }
        }
    </style>
</head>
<body class="text-textPrimary bg-primary selection:bg-foamBlue selection:text-white m-0 p-0">

    <div id="app-container" class="w-full max-w-[375px] mx-auto min-h-[840px] bg-primary relative flex flex-col shadow-2xl md:shadow-none overflow-hidden">
        
        <!-- Fixed Progress Bar -->
        <div id="progress-indicator" class="fixed top-0 left-0 right-0 w-full max-w-[375px] mx-auto h-[4px] bg-secondary z-50">
            <div class="h-full bg-foamBlue w-full transition-all duration-300"></div>
        </div>

        <!-- Header -->
        <header id="progress-header" class="w-full pt-12 pb-4 px-4 bg-primary z-20 flex flex-col gap-4 mt-1">
            <div class="flex items-center justify-between w-full">
                <button type="button" class="w-10 h-10 flex items-center justify-center text-textPrimary -ml-2">
                    <i class="fa-solid fa-arrow-left text-[20px]"></i>
                </button>
                <div class="w-10 h-10"></div>
            </div>
            <div class="flex items-center gap-2">
                <span class="font-sans text-[12px] font-semibold text-foamBlue tracking-wide uppercase">Step 1 of 1</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar flex flex-col pb-[160px] relative z-10 px-4">
            
            <!-- Header Section -->
            <section id="header-section" class="mt-[16px]">
                <h1 class="font-serif text-[26px] font-bold text-textPrimary leading-tight mb-[8px]">
                    Let's put a face to the name.
                </h1>
                <p class="font-sans text-[15px] text-textSecondary leading-relaxed">
                    Your manager will see this when assigning jobs.
                </p>
            </section>

            <!-- Profile Photo Section -->
            <section id="profile-photo-section" class="mt-[24px] flex flex-col items-center w-full">
                <div class="relative w-[96px] h-[96px] rounded-full bg-secondary flex items-center justify-center shadow-level-1 cursor-pointer hover:bg-borderSubtle transition-colors">
                    <i class="fa-solid fa-camera text-foamBlue text-[28px]"></i>
                </div>
                <button type="button" class="mt-[8px] font-sans text-[13px] font-medium text-foamBlue hover:text-foamBlueHover transition-colors">
                    Add photo
                </button>
                <span class="mt-[4px] font-sans text-[11px] text-textTertiary">
                    Optional
                </span>
            </section>

            <!-- Form Section -->
            <section id="identity-form" class="mt-[32px] flex flex-col gap-[24px] w-full">
                
                <!-- Display Name Input -->
                <div class="flex flex-col gap-[8px]">
                    <label for="display-name" class="font-sans text-[14px] font-medium text-textPrimary">
                        Display name
                    </label>
                    <input 
                        type="text" 
                        id="display-name"
                        class="w-full h-[52px] bg-elevated border border-borderSubtle rounded-[12px] px-[16px] font-sans text-[16px] text-textPrimary placeholder:text-textTertiary focus:outline-none focus:border-foamBlue focus:ring-1 focus:ring-foamBlue shadow-sm transition-all"
                        placeholder="How should your manager and team know you?"
                    >
                    <p class="font-sans text-[11px] text-textTertiary leading-tight">
                        This appears on job assignments and the team roster.
                    </p>
                </div>

                <!-- Phone Number Input -->
                <div class="flex flex-col gap-[8px]">
                    <div class="flex items-center gap-[6px]">
                        <label for="phone-number" class="font-sans text-[14px] font-medium text-textPrimary">
                            Phone number
                        </label>
                        <span class="font-sans text-[13px] text-textTertiary">(Optional)</span>
                    </div>
                    <input 
                        type="tel" 
                        id="phone-number"
                        class="w-full h-[52px] bg-elevated border border-borderSubtle rounded-[12px] px-[16px] font-sans text-[16px] text-textPrimary placeholder:text-textTertiary focus:outline-none focus:border-foamBlue focus:ring-1 focus:ring-foamBlue shadow-sm transition-all"
                        placeholder="(404) 555-0123"
                    >
                    <p class="font-sans text-[11px] text-textTertiary leading-tight">
                        Your manager may use this to reach you about jobs.
                    </p>
                </div>

            </section>

        </main>

        <!-- Fixed Action Footer -->
        <footer id="action-footer" class="fixed bottom-0 w-full max-w-[375px] bg-gradient-to-t from-primary via-primary to-transparent pt-12 pb-[24px] px-[16px] z-20 flex flex-col gap-[16px]">
            
            <button type="button" class="w-full h-[48px] bg-foamBlue hover:bg-foamBlueHover active:bg-foamBlueHover text-white font-sans text-[16px] font-semibold rounded-[12px] transition-colors duration-200 shadow-level-2 flex items-center justify-center">
                Continue
            </button>
            
        </footer>

    </div>

</body>
</html>
