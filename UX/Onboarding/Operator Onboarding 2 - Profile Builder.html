<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Operator: Build Your Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        primary: '#FAFAFA',
                        secondary: '#F4F4F5',
                        elevated: '#FFFFFF',
                        borderSubtle: '#E4E4E7',
                        borderDefault: '#D4D4D8',
                        textPrimary: '#0A0A0A',
                        textSecondary: '#525252',
                        textTertiary: '#A3A3A3',
                        textDisabled: '#D4D4D4',
                        foamBlue: '#339DC7',
                        foamBlueHover: '#2B85A9',
                        foamBlueSubtle: 'rgba(51,157,199,0.10)',
                        accentSubtle: '#E1F0F7',
                        success: '#16A34A',
                        warning: '#D97706',
                        error: '#DC2626',
                        info: '#2563EB',
                    },
                    boxShadow: {
                        'level-1': '0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06)',
                        'level-2': '0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FAFAFA;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media (max-width: 375px) {
            .mobile-container {
                max-width: 375px;
                margin: 0 auto;
                min-height: 840px;
                background-color: #FAFAFA;
                position: relative;
            }
        }
    </style>
</head>
<body class="text-textPrimary bg-primary selection:bg-foamBlue selection:text-white m-0 p-0">

    <div id="app-container" class="w-full max-w-[375px] mx-auto min-h-[840px] bg-primary relative flex flex-col shadow-2xl md:shadow-none overflow-hidden">
        
        <!-- Progress Header -->
        <header id="progress-header" class="w-full pt-12 pb-4 px-4 bg-primary z-20 flex flex-col gap-4">
            <div class="flex items-center justify-between w-full">
                <button type="button" class="w-10 h-10 flex items-center justify-center text-textPrimary -ml-2">
                    <i class="fa-solid fa-arrow-left text-[20px]"></i>
                </button>
                <span class="font-sans text-[14px] font-semibold text-textPrimary">Step 2 of 4</span>
                <div class="w-10 h-10"></div> <!-- Spacer for centering -->
            </div>
            
            <!-- Progress Bar -->
            <div class="w-full h-[4px] bg-secondary rounded-full overflow-hidden">
                <div class="h-full bg-foamBlue w-[50%] rounded-full transition-all duration-500"></div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content" class="flex-1 overflow-y-auto no-scrollbar flex flex-col px-4 pb-[120px] relative z-10">
            
            <!-- Header Section -->
            <section id="header-section" class="mt-[16px] mb-[32px]">
                <h1 class="font-serif text-[26px] font-bold text-textPrimary leading-tight mb-[8px]">
                    Your shop, your brand.
                </h1>
                <p class="font-sans text-[15px] text-textSecondary leading-relaxed">
                    This is what customers see when they find you.
                </p>
            </section>

            <!-- Profile Photo Section -->
            <section id="profile-photo" class="flex flex-col items-center mb-[32px]">
                <button type="button" class="w-[96px] h-[96px] rounded-full bg-secondary flex items-center justify-center mb-[8px] border border-borderSubtle transition-transform active:scale-95">
                    <i class="fa-solid fa-camera text-[28px] text-foamBlue"></i>
                </button>
                <button type="button" class="font-sans text-[13px] font-medium text-foamBlue hover:text-foamBlueHover transition-colors">
                    Add photo
                </button>
            </section>

            <!-- Form Fields Section -->
            <section id="form-fields" class="flex flex-col gap-[16px] mb-[24px]">
                
                <!-- Business Name Input -->
                <div class="flex flex-col gap-[8px]">
                    <label for="business-name" class="font-sans text-[14px] font-medium text-textPrimary">
                        Your name or business name
                    </label>
                    <input type="text" id="business-name" placeholder="e.g., Marcus T. Detailing" 
                        class="w-full h-[48px] px-[16px] bg-elevated border border-borderDefault rounded-[12px] font-sans text-[16px] text-textPrimary placeholder:text-textTertiary focus:outline-none focus:border-foamBlue focus:ring-1 focus:ring-foamBlue transition-all shadow-sm">
                    <span class="font-sans text-[11px] text-textTertiary">
                        This appears on your profile and booking cards.
                    </span>
                </div>

                <!-- Bio Input -->
                <div class="flex flex-col gap-[8px]">
                    <div class="flex items-center justify-between">
                        <label for="bio" class="font-sans text-[14px] font-medium text-textPrimary">
                            Bio
                        </label>
                        <span class="font-sans text-[12px] text-textTertiary">Optional</span>
                    </div>
                    <div class="relative">
                        <textarea id="bio" placeholder="Tell customers what makes your work different." 
                            class="w-full h-[100px] p-[16px] bg-elevated border border-borderDefault rounded-[12px] font-sans text-[16px] text-textPrimary placeholder:text-textTertiary focus:outline-none focus:border-foamBlue focus:ring-1 focus:ring-foamBlue transition-all shadow-sm resize-none"></textarea>
                        <span class="absolute bottom-[12px] right-[16px] font-sans text-[12px] text-textTertiary bg-elevated px-1">
                            0 / 200
                        </span>
                    </div>
                </div>

            </section>

            <!-- Years Experience Section -->
            <section id="experience-section" class="mb-[24px]">
                <div class="w-full bg-elevated rounded-[12px] p-[12px] border border-borderSubtle shadow-level-1 flex items-center justify-between">
                    <span class="font-sans text-[14px] font-medium text-textPrimary pl-[4px]">
                        Years of experience
                    </span>
                    <div class="flex items-center gap-[16px]">
                        <button type="button" class="w-[32px] h-[32px] rounded-full border border-borderSubtle flex items-center justify-center text-foamBlue hover:bg-secondary transition-colors active:scale-95">
                            <i class="fa-solid fa-minus text-[14px]"></i>
                        </button>
                        <span class="font-sans text-[18px] font-semibold text-textPrimary min-w-[20px] text-center">
                            5
                        </span>
                        <button type="button" class="w-[32px] h-[32px] rounded-full border border-borderSubtle flex items-center justify-center text-foamBlue hover:bg-secondary transition-colors active:scale-95">
                            <i class="fa-solid fa-plus text-[14px]"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Specialties Section -->
            <section id="specialties-section" class="mb-[32px]">
                <h3 class="font-sans text-[11px] font-medium text-textTertiary uppercase tracking-wider mb-[12px]">
                    SPECIALTIES
                </h3>
                <div class="flex flex-wrap gap-[8px]">
                    <button type="button" class="px-[16px] py-[8px] rounded-[9999px] border border-transparent bg-foamBlue text-white font-sans text-[13px] font-medium transition-all shadow-sm">
                        Interior
                    </button>
                    <button type="button" class="px-[16px] py-[8px] rounded-[9999px] border border-transparent bg-foamBlue text-white font-sans text-[13px] font-medium transition-all shadow-sm">
                        Exterior
                    </button>
                    <button type="button" class="px-[16px] py-[8px] rounded-[9999px] border border-borderDefault bg-elevated text-textSecondary font-sans text-[13px] font-medium hover:border-textTertiary transition-all shadow-sm">
                        Paint Correction
                    </button>
                    <button type="button" class="px-[16px] py-[8px] rounded-[9999px] border border-transparent bg-foamBlue text-white font-sans text-[13px] font-medium transition-all shadow-sm">
                        Ceramic Coating
                    </button>
                    <button type="button" class="px-[16px] py-[8px] rounded-[9999px] border border-borderDefault bg-elevated text-textSecondary font-sans text-[13px] font-medium hover:border-textTertiary transition-all shadow-sm">
                        Window Tint
                    </button>
                    <button type="button" class="px-[16px] py-[8px] rounded-[9999px] border border-borderDefault bg-elevated text-textSecondary font-sans text-[13px] font-medium hover:border-textTertiary transition-all shadow-sm">
                        Fleet
                    </button>
                </div>
            </section>

        </main>

        <!-- Fixed Action Footer -->
        <footer id="action-footer" class="fixed bottom-0 w-full max-w-[375px] bg-gradient-to-t from-primary via-primary to-transparent pt-12 pb-[24px] px-[16px] z-20">
            <button type="button" class="w-full h-[48px] bg-foamBlue hover:bg-foamBlueHover active:bg-foamBlueHover text-white font-sans text-[16px] font-semibold rounded-[12px] transition-colors duration-200 shadow-level-2 flex items-center justify-center">
                Continue
            </button>
        </footer>

    </div>

</body>
</html>
