    <script>
        window.addEventListener('load', function() {
            try {
                var trace = {
                    x: ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
                    y: [10, 14, 12, 18],
                    type: 'scatter',
                    mode: 'lines+markers',
                    line: {
                        color: '#339DC7',
                        width: 2
                    },
                    marker: {
                        color: '#339DC7',
                        size: [6, 6, 6, 10],
                        line: {
                            color: '#339DC7',
                            width: 2
                        }
                    }
                };

                var layout = {
                    margin: { t: 5, r: 10, b: 25, l: 30 },
                    plot_bgcolor: '#FFFFFF',
                    paper_bgcolor: '#FFFFFF',
                    xaxis: {
                        showgrid: false,
                        showline: false,
                        tickfont: { size: 10, color: '#A3A3A3' }
                    },
                    yaxis: {
                        showgrid: true,
                        gridcolor: '#E4E4E7',
                        showline: false,
                        tickfont: { size: 10, color: '#A3A3A3' }
                    },
                    showlegend: false
                };

                var config = {
                    responsive: true,
                    displayModeBar: false,
                    displaylogo: false
                };

                Plotly.newPlot('performance-chart', [trace], layout, config);
            } catch(e) {
                document.getElementById('performance-chart').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#A3A3A3;font-size:12px;">Chart unavailable</div>';
            }
        });

        document.querySelectorAll('.toggle-checkbox').forEach(function(checkbox) {
            checkbox.addEventListener('change', function() {
                var span = this.nextElementSibling;
                if(this.checked) {
                    span.style.backgroundColor = '#339DC7';
                } else {
                    span.style.backgroundColor = '#D4D4D8';
                }
            });
        });
    </script>
