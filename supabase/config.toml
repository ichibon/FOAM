[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["foam://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[functions.stripe-create-connect-account]
verify_jwt = true

[functions.stripe-create-customer]
verify_jwt = true

[functions.stripe-create-payment-intent]
verify_jwt = true

[functions.stripe-capture]
verify_jwt = true

[functions.booking-cancelled]
verify_jwt = true

[functions.stripe-hold-expire]
verify_jwt = false
schedule = "0 6 * * *"

[functions.stripe-webhook]
verify_jwt = false

[functions.booking-modification-request]
verify_jwt = true

[functions.no-show-report]
verify_jwt = true

[functions.no-show-confirm]
verify_jwt = true
